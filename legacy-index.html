<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Corruption Lab</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0c0c0c;
  --panel-bg: #141414;
  --panel-border: #333;
  --text: #ddd;
  --text-dim: #999;
  --green: #4ec9b0;
  --blue: #569cd6;
  --amber: #ce9178;
  --red: #f44747;
  --yellow: #dcdcaa;
  --purple: #c586c0;
  --comment: #7fbf68;
  --font: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
}

html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 13px; }

#app {
  display: flex; flex-direction: column; height: 100vh; overflow: hidden;
}

header {
  display: flex; align-items: center; gap: 1rem; padding: 0.5rem 1rem;
  border-bottom: 1px solid var(--panel-border); background: var(--panel-bg);
  flex-shrink: 0;
}
header h1 { font-size: 14px; color: var(--green); font-weight: normal; white-space: nowrap; }
nav { display: flex; gap: 0.15rem; flex-wrap: wrap; align-items: center; }
.nav-unit-label {
  font-size: 10px; color: var(--text-dim); text-transform: uppercase;
  letter-spacing: 0.05em; padding: 0.25rem 0.5rem; margin-left: 0.5rem;
  border-left: 1px solid var(--panel-border);
}
.nav-unit-label:first-child { margin-left: 0; border-left: none; }
nav button {
  background: transparent; border: 1px solid var(--panel-border); color: var(--text-dim);
  padding: 0.25rem 0.5rem; font-family: var(--font); font-size: 11px; cursor: pointer;
  transition: all 0.15s; min-width: 2em; text-align: center;
}
nav button:hover:not(:disabled) { border-color: var(--text-dim); color: var(--text); }
nav button.active { border-color: var(--green); color: var(--green); }
nav button.completed { border-color: var(--comment); color: var(--comment); }
nav button.completed::after { content: ' ✓'; font-size: 9px; }
nav button:disabled { opacity: 0.3; cursor: not-allowed; }

#badges { display: flex; gap: 0.5rem; margin-left: auto; }
.badge {
  font-size: 11px; padding: 0.15rem 0.5rem; border: 1px solid var(--yellow);
  color: var(--yellow); border-radius: 2px; white-space: nowrap;
}

main {
  flex: 1; display: grid; overflow: hidden;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: 1px; background: var(--panel-border);
}

.panel {
  background: var(--panel-bg); display: flex; flex-direction: column; overflow: hidden;
}
.panel-hdr {
  padding: 0.35rem 0.75rem; font-size: 11px; color: var(--text-dim);
  border-bottom: 1px solid var(--panel-border); flex-shrink: 0;
  text-transform: uppercase; letter-spacing: 0.05em;
}
.panel-body { flex: 1; overflow-y: auto; padding: 0.75rem; }

/* Source panel */
#source-panel { grid-column: 1; grid-row: 1; }
#source-code {
  white-space: pre; line-height: 1.6; tab-size: 4;
}
.src-line { display: block; padding: 0 0.5rem; position: relative; }
.src-line .ln { color: var(--text-dim); display: inline-block; width: 2.5em; text-align: right; margin-right: 1em; user-select: none; }
.src-line.highlight { background: rgba(78, 201, 176, 0.1); border-left: 2px solid var(--green); }
.src-line.executing { background: rgba(220, 220, 170, 0.12); border-left: 2px solid var(--yellow); }
.src-line.executing .ln::before { content: '▶'; color: var(--yellow); position: absolute; left: 0.15rem; font-size: 10px; }
.src-kw { color: var(--blue); }
.src-type { color: var(--blue); }
.src-fn { color: var(--yellow); }
.src-str { color: var(--amber); }
.src-cmt { color: var(--comment); font-style: italic; }
.src-vuln { color: var(--red); text-decoration: underline wavy var(--red); }

/* Stack panel */
#stack-panel { grid-column: 2; grid-row: 1; }
#stack-viz { font-size: 12px; }

.stack-row {
  display: flex; align-items: center; padding: 2px 0;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  transition: background 0.3s;
}
.stack-row.region-start { border-top: 1px solid var(--panel-border); }
.stack-addr { color: var(--text-dim); width: 8em; text-align: right; padding-right: 0.75em; flex-shrink: 0; font-size: 11px; }
.stack-bytes { display: flex; gap: 2px; flex-shrink: 0; }
.stack-byte {
  width: 2.2em; text-align: center; padding: 2px 0; border-radius: 2px;
  transition: all 0.2s; font-size: 12px;
}
.stack-byte.empty { color: var(--text-dim); }
.stack-ascii { color: var(--text-dim); padding-left: 0.75em; width: 5em; flex-shrink: 0; font-size: 11px; }
.stack-label { color: var(--text-dim); padding-left: 0.75em; font-size: 11px; white-space: nowrap; }

.region-buffer .stack-byte { background: rgba(78, 201, 176, 0.15); color: var(--green); }
.region-canary .stack-byte { background: rgba(197, 134, 192, 0.15); color: var(--purple); }
.region-ebp .stack-byte { background: rgba(86, 156, 214, 0.15); color: var(--blue); }
.region-ret .stack-byte { background: rgba(206, 145, 120, 0.15); color: var(--amber); }

.stack-byte.overflow {
  background: rgba(244, 71, 71, 0.3) !important; color: var(--red) !important;
  animation: pulse 0.6s ease;
}
.stack-byte.just-written { animation: flash 0.4s ease; }
.stack-byte.current {
  outline: 2px solid var(--yellow); outline-offset: -1px;
  animation: flash 0.3s ease;
}

@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
@keyframes flash { 0% { background: rgba(255,255,255,0.4); } 100% {} }

/* Input panel */
#input-panel { grid-column: 1; grid-row: 2; }
#input-area { margin-bottom: 0.75rem; }
#input-area label { display: block; font-size: 11px; color: var(--text-dim); margin-bottom: 0.35rem; }
#payload-input {
  width: 100%; background: #0a0a0a; border: 1px solid var(--panel-border); color: var(--text);
  font-family: var(--font); font-size: 13px; padding: 0.5rem; resize: none; min-height: 2.5em;
}
#payload-input:focus { outline: none; border-color: var(--green); }
#payload-input::placeholder { color: var(--text-dim); }

.input-mode-toggle {
  display: flex; gap: 0.5rem; margin-bottom: 0.5rem;
}
.input-mode-toggle button {
  background: transparent; border: 1px solid var(--panel-border); color: var(--text-dim);
  font-family: var(--font); font-size: 11px; padding: 0.2rem 0.5rem; cursor: pointer;
}
.input-mode-toggle button.active { border-color: var(--green); color: var(--green); }

.controls {
  display: flex; gap: 0.5rem; flex-wrap: wrap;
}
.controls button {
  background: transparent; border: 1px solid var(--panel-border); color: var(--text);
  font-family: var(--font); font-size: 12px; padding: 0.35rem 1rem; cursor: pointer;
  transition: all 0.15s;
}
.controls button:hover:not(:disabled) { border-color: var(--green); color: var(--green); }
.controls button.primary { border-color: var(--green); color: var(--green); }
.controls button:disabled { opacity: 0.3; cursor: not-allowed; }

/* Payload builder */
#payload-builder {
  margin-top: 0.75rem; padding: 0.5rem; border: 1px solid var(--panel-border);
  font-size: 11px;
}
#payload-builder h4 { color: var(--text-dim); font-weight: normal; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.05em; }
.builder-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.35rem; }
.builder-row label { color: var(--text-dim); width: 10em; }
.builder-row input {
  background: #0a0a0a; border: 1px solid var(--panel-border); color: var(--text);
  font-family: var(--font); font-size: 11px; padding: 0.25rem 0.4rem; width: 10em;
}
.builder-row input:focus { outline: none; border-color: var(--green); }
.builder-row .hint { color: var(--text-dim); font-size: 10px; }
#built-payload { color: var(--yellow); word-break: break-all; margin-top: 0.5rem; padding: 0.35rem; background: #0a0a0a; min-height: 1.5em; }

/* Hex calculator */
#hex-calc {
  margin-top: 0.75rem; padding: 0.5rem; border: 1px solid var(--panel-border);
  font-size: 11px;
}
#hex-calc h4 { color: var(--text-dim); font-weight: normal; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.05em; }
.calc-row { display: flex; align-items: center; gap: 0.35rem; margin-bottom: 0.35rem; flex-wrap: wrap; }
.calc-row input {
  background: #0a0a0a; border: 1px solid var(--panel-border); color: var(--text);
  font-family: var(--font); font-size: 12px; padding: 0.25rem 0.4rem; width: 10em;
}
.calc-row input:focus { outline: none; border-color: var(--green); }
.calc-op { color: var(--yellow); font-size: 14px; font-weight: bold; width: 1.5em; text-align: center; }
.calc-eq { color: var(--green); font-size: 14px; font-weight: bold; width: 1.5em; text-align: center; }
#calc-result {
  color: var(--green); font-size: 12px; font-weight: bold; padding: 0.25rem 0.4rem;
  background: #0a0a0a; border: 1px solid var(--green); min-width: 10em; display: inline-block;
}
.calc-hint { color: var(--text-dim); font-size: 10px; margin-top: 0.25rem; }

/* Symbols table */
#symbols-table { margin-top: 0.75rem; font-size: 11px; }
#symbols-table h4 { color: var(--text-dim); font-weight: normal; margin-bottom: 0.35rem; text-transform: uppercase; letter-spacing: 0.05em; }
.sym-row { display: flex; gap: 1rem; padding: 0.15rem 0; }
.sym-name { color: var(--yellow); width: 8em; }
.sym-addr { color: var(--amber); }
.sym-note { color: var(--text-dim); }
.sym-row.target .sym-name { color: var(--green); }
.sym-row.target .sym-addr { color: var(--green); }

/* Log panel */
#log-panel { grid-column: 2; grid-row: 2; }
#exec-log { font-size: 12px; line-height: 1.6; }
.log-entry { padding: 0.1rem 0; border-bottom: 1px solid rgba(255,255,255,0.02); }
.log-info { color: var(--text-dim); }
.log-action { color: var(--text); }
.log-warn { color: var(--amber); }
.log-error { color: var(--red); }
.log-success { color: var(--green); font-weight: bold; }
.log-addr { color: var(--amber); }
.log-label { color: var(--text-dim); font-size: 10px; display: inline; margin-left: 0.5em; }

/* Exercise description */
#exercise-desc {
  padding: 0.5rem 0.75rem; font-size: 12px; line-height: 1.5;
  border-bottom: 1px solid var(--panel-border); flex-shrink: 0;
  color: var(--text); background: rgba(78, 201, 176, 0.03);
}
#exercise-desc strong { color: var(--green); font-weight: normal; }

/* Sandbox controls */
.sandbox-controls {
  display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 0.75rem;
  padding: 0.5rem; border: 1px solid var(--panel-border);
}
.sandbox-controls label { font-size: 11px; color: var(--text-dim); display: flex; align-items: center; gap: 0.4rem; }
.sandbox-controls input[type="range"] { width: 80px; }
.sandbox-controls input[type="checkbox"] { accent-color: var(--green); }

/* Success banner */
#success-banner {
  display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  background: #111; border: 2px solid var(--green); padding: 2rem 3rem;
  text-align: center; z-index: 100; box-shadow: 0 0 60px rgba(78,201,176,0.2);
}
#success-banner.show { display: block; animation: fadeIn 0.3s ease; }
#success-banner h2 { color: var(--green); font-size: 16px; margin-bottom: 0.5rem; }
#success-banner p { color: var(--text); font-size: 13px; }
#success-banner button {
  margin-top: 1rem; background: transparent; border: 1px solid var(--green); color: var(--green);
  font-family: var(--font); font-size: 12px; padding: 0.35rem 1rem; cursor: pointer;
}
@keyframes fadeIn { from { opacity: 0; transform: translate(-50%, -50%) scale(0.95); } to { opacity: 1; transform: translate(-50%, -50%) scale(1); } }

/* CRT scanline overlay */
.crt::after {
  content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: repeating-linear-gradient(0deg, rgba(0,0,0,0.03) 0px, rgba(0,0,0,0.03) 1px, transparent 1px, transparent 3px);
  pointer-events: none; z-index: 1000;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--panel-bg); }
::-webkit-scrollbar-thumb { background: var(--panel-border); }

#gadget-table { margin-top: 0.75rem; font-size: 11px; }
#gadget-table h4 { color: var(--text-dim); font-weight: normal; margin-bottom: 0.35rem; text-transform: uppercase; letter-spacing: 0.05em; }
.gadget-row { display: flex; gap: 0.75rem; padding: 0.15rem 0; cursor: pointer; }
.gadget-row:hover { background: rgba(255,255,255,0.03); }
.gadget-addr { color: var(--amber); width: 9em; }
.gadget-asm { color: var(--text); }
.gadget-row.used { opacity: 0.5; }

#register-display {
  margin-top: 0.75rem; padding: 0.5rem; border: 1px solid var(--panel-border);
  font-size: 11px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.25rem;
}
.reg-entry { display: flex; gap: 0.35rem; }
.reg-name { color: var(--blue); width: 3em; }
.reg-val { color: var(--amber); }
.reg-val.changed { color: var(--green); animation: flash 0.4s ease; }

#sigframe-builder {
  margin-top: 0.75rem; padding: 0.5rem; border: 1px solid var(--panel-border);
  font-size: 11px;
}
#sigframe-builder h4 { color: var(--text-dim); font-weight: normal; margin-bottom: 0.5rem; text-transform: uppercase; }
.sigframe-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.25rem; }
.sigframe-row label { color: var(--blue); width: 5em; }
.sigframe-row input {
  background: #0a0a0a; border: 1px solid var(--panel-border); color: var(--text);
  font-family: var(--font); font-size: 11px; padding: 0.2rem 0.4rem; width: 10em;
}
#heap-viz { font-size: 12px; }
.heap-memory-strip { display: flex; flex-wrap: wrap; gap: 2px; margin-bottom: 1rem; padding: 0.5rem; border: 1px solid var(--panel-border); }
.heap-chunk { display: flex; flex-direction: column; border: 1px solid var(--panel-border); border-radius: 2px; overflow: hidden; min-width: 4em; }
.heap-chunk.allocated { border-color: var(--green); }
.heap-chunk.freed { border-color: var(--text-dim); opacity: 0.7; }
.heap-chunk.corrupted { border-color: var(--red); }
.heap-chunk.highlighted { outline: 2px solid var(--yellow); outline-offset: 1px; }
.heap-chunk-header { display: flex; font-size: 10px; padding: 2px 4px; background: rgba(255,255,255,0.05); }
.heap-chunk-header .prev-size { color: var(--text-dim); margin-right: 0.5em; }
.heap-chunk-header .size-field { color: var(--amber); }
.heap-chunk-header .flags { color: var(--purple); margin-left: 0.25em; }
.heap-chunk-data { padding: 4px; font-size: 11px; min-height: 1.5em; display: flex; flex-wrap: wrap; gap: 1px; }
.heap-chunk-data .byte { width: 2em; text-align: center; font-size: 11px; padding: 1px 0; border-radius: 1px; }
.heap-chunk-data .byte.allocated { color: var(--green); background: rgba(78,201,176,0.1); }
.heap-chunk-data .byte.freed { color: var(--text-dim); background: rgba(255,255,255,0.03); }
.heap-chunk-data .byte.pointer { color: var(--amber); background: rgba(206,145,120,0.15); }
.heap-chunk-data .byte.corrupted { color: var(--red); background: rgba(244,71,71,0.2); }
.heap-chunk-label { font-size: 10px; color: var(--text-dim); padding: 2px 4px; text-align: center; border-top: 1px solid var(--panel-border); }
.free-lists { margin-top: 0.75rem; font-size: 11px; }
.free-lists h4 { color: var(--text-dim); font-weight: normal; margin-bottom: 0.35rem; text-transform: uppercase; letter-spacing: 0.05em; }
.free-list-row { display: flex; align-items: center; gap: 0.25rem; padding: 0.15rem 0; flex-wrap: wrap; }
.free-list-name { color: var(--blue); width: 10em; }
.free-list-node { display: inline-flex; align-items: center; gap: 0.25rem; }
.free-list-addr { color: var(--amber); padding: 1px 4px; border: 1px solid var(--panel-border); border-radius: 2px; }
.free-list-arrow { color: var(--text-dim); }
.free-list-nil { color: var(--text-dim); font-style: italic; }
.func-ptr-table { margin-top: 0.75rem; font-size: 11px; }
.func-ptr-table h4 { color: var(--text-dim); font-weight: normal; margin-bottom: 0.35rem; text-transform: uppercase; letter-spacing: 0.05em; }
.func-ptr-row { display: flex; gap: 0.75rem; padding: 0.15rem 0; }
.func-ptr-name { color: var(--yellow); width: 10em; }
.func-ptr-val { color: var(--amber); }
.func-ptr-val.overwritten { color: var(--red); animation: flash 0.4s ease; }
.heap-top-chunk { border: 1px dashed var(--text-dim); border-radius: 2px; padding: 4px 8px; font-size: 10px; color: var(--text-dim); text-align: center; flex: 1; min-width: 4em; }
</style>
</head>
<body class="crt">
<div id="app">
  <header>
    <h1>// MEMORY CORRUPTION LAB</h1>
    <nav id="exercise-nav"></nav>
    <div id="badges"></div>
  </header>
  <main>
    <div class="panel" id="source-panel">
      <div class="panel-hdr">source.c</div>
      <div id="exercise-desc"></div>
      <div class="panel-body"><div id="source-code"></div></div>
    </div>
    <div class="panel" id="stack-panel">
      <div class="panel-hdr">stack <span id="stack-info"></span></div>
      <div class="panel-body"><div id="stack-viz"></div><div id="heap-viz"></div></div>
    </div>
    <div class="panel" id="input-panel">
      <div class="panel-hdr">input</div>
      <div class="panel-body">
        <div id="input-area"></div>
        <div id="payload-builder" style="display:none"></div>
        <div id="hex-calc" style="display:none"></div>
        <div id="symbols-table" style="display:none"></div>
        <div id="gadget-table" style="display:none"></div>
        <div id="register-display" style="display:none"></div>
        <div id="sigframe-builder" style="display:none"></div>
      </div>
    </div>
    <div class="panel" id="log-panel">
      <div class="panel-hdr">execution log</div>
      <div class="panel-body"><div id="exec-log"></div></div>
    </div>
  </main>
</div>
<div id="success-banner">
  <h2 id="success-title"></h2>
  <p id="success-msg"></p>
  <button onclick="dismissSuccess()">Continue</button>
</div>

<script>
// ──────────────────────────────────────────────
// Stack Simulator
// ──────────────────────────────────────────────
class StackSim {
  constructor(bufSize, retAddr, savedEbp, baseAddr, useCanary) {
    this.bufSize = bufSize;
    this.canarySize = useCanary ? 4 : 0;
    this.ebpSize = 4;
    this.retSize = 4;
    this.totalSize = bufSize + this.canarySize + this.ebpSize + this.retSize;
    this.baseAddr = baseAddr || 0xbfff0100;
    this.memory = new Uint8Array(this.totalSize);
    this.written = new Uint8Array(this.totalSize);
    this.overflowAt = new Uint8Array(this.totalSize);
    this.inputLen = 0;
    this.useCanary = !!useCanary;

    this.origRetAddr = retAddr;
    this.origSavedEbp = savedEbp;
    this.canaryValue = 0;
    if (this.useCanary) {
      this.canaryValue = (Math.random() * 0xffffffff) >>> 0;
      this._writeLE(this.bufSize, this.canaryValue, 4);
    }
    this._writeLE(this.bufSize + this.canarySize, savedEbp, 4);
    this._writeLE(this.bufSize + this.canarySize + 4, retAddr, 4);
    this.written.fill(0);
  }

  _writeLE(offset, value, size) {
    for (let i = 0; i < size; i++) {
      this.memory[offset + i] = (value >>> (i * 8)) & 0xff;
    }
  }

  _readLE(offset, size) {
    let v = 0;
    for (let i = size - 1; i >= 0; i--) {
      v = (v * 256) + this.memory[offset + i];
    }
    return v >>> 0;
  }

  writeInput(bytes) {
    this.inputLen = bytes.length;
    if (this.useCanary) this._writeLE(this.bufSize, this.canaryValue, 4);
    this._writeLE(this.bufSize + this.canarySize, this.origSavedEbp, 4);
    this._writeLE(this.bufSize + this.canarySize + 4, this.origRetAddr, 4);
    this.written.fill(0);
    this.overflowAt.fill(0);

    for (let i = 0; i < bytes.length && i < this.totalSize; i++) {
      this.memory[i] = bytes[i];
      this.written[i] = 1;
      if (i >= this.bufSize) {
        this.overflowAt[i] = 1;
      }
    }
  }

  resetForInput() {
    if (this.useCanary) this._writeLE(this.bufSize, this.canaryValue, 4);
    this._writeLE(this.bufSize + this.canarySize, this.origSavedEbp, 4);
    this._writeLE(this.bufSize + this.canarySize + 4, this.origRetAddr, 4);
    this.written.fill(0);
    this.overflowAt.fill(0);
    this.inputLen = 0;
    this.hlStart = -1;
    this.hlEnd = -1;
  }

  clearBlank() {
    this.memory.fill(0);
    this.written.fill(0);
    this.overflowAt.fill(0);
    this.hlStart = -1;
    this.hlEnd = -1;
  }

  writeWord(offset, bytes) {
    for (let i = 0; i < bytes.length && (offset + i) < this.totalSize; i++) {
      this.memory[offset + i] = bytes[i];
      this.written[offset + i] = 1;
      if ((offset + i) >= this.bufSize) this.overflowAt[offset + i] = 1;
    }
    this.inputLen = Math.max(this.inputLen, offset + bytes.length);
    this.hlStart = offset;
    this.hlEnd = offset + bytes.length;
  }

  markRegion(start, end) {
    for (let i = start; i < end && i < this.totalSize; i++) this.written[i] = 1;
    this.hlStart = start;
    this.hlEnd = end;
  }

  clearHighlight() { this.hlStart = -1; this.hlEnd = -1; }

  getRetAddr() { return this._readLE(this.bufSize + this.canarySize + 4, 4); }
  getSavedEbp() { return this._readLE(this.bufSize + this.canarySize, 4); }
  getCanary() { return this.useCanary ? this._readLE(this.bufSize, 4) : null; }
  canaryIntact() { return !this.useCanary || this.getCanary() === this.canaryValue; }

  regionOf(byteIndex) {
    if (byteIndex < this.bufSize) return 'buffer';
    if (this.useCanary && byteIndex < this.bufSize + this.canarySize) return 'canary';
    if (byteIndex < this.bufSize + this.canarySize + this.ebpSize) return 'ebp';
    if (byteIndex < this.bufSize + this.canarySize + this.ebpSize + this.retSize) return 'ret';
    return 'ret'; // extra bytes past ret (for ret2libc/ROP/SROP payloads)
  }
}

// ──────────────────────────────────────────────
// HeapSim — glibc-like heap allocator simulation
// ──────────────────────────────────────────────
class HeapSim {
  constructor(size = 1024) {
    this.memorySize = size;
    this.memory = new Uint8Array(size);
    this.written = new Uint8Array(size);
    this.highlight = { start: -1, end: -1 };
    this.chunks = new Map(); // addr → {size, allocated, dataStart}
    this.HEADER_SIZE = 8;   // prev_size(4) + size(4)
    this.MIN_CHUNK = 16;    // header + at least 8 data (or fd+bk)
    this.tcache = {};        // size → [addr, ...] (max 7 per bin)
    this.fastbins = {};      // size → [addr, ...]
    this.unsorted = [];      // [addr, ...]
    this.topAddr = 0;
    this.topSize = size;
    this.funcPtrs = {};
    this.mainArena = 0x0804b100;
    this.baseAddr = 0x08050000;
  }

  _writeLE(offset, value, size) {
    for (let i = 0; i < size; i++) {
      this.memory[offset + i] = (value >>> (i * 8)) & 0xff;
    }
  }

  _readLE(offset, size) {
    let v = 0;
    for (let i = size - 1; i >= 0; i--) {
      v = (v * 256) + this.memory[offset + i];
    }
    return v >>> 0;
  }

  _alignSize(requested) {
    // Add header, align to 8 bytes, enforce minimum
    let total = requested + this.HEADER_SIZE;
    total = (total + 7) & ~7;
    if (total < this.MIN_CHUNK) total = this.MIN_CHUNK;
    return total;
  }

  malloc(requested) {
    const chunkSize = this._alignSize(requested);
    const dataSize = chunkSize - this.HEADER_SIZE;

    // 1. Check tcache
    if (this.tcache[chunkSize] && this.tcache[chunkSize].length > 0) {
      const addr = this.tcache[chunkSize].pop();
      const chunk = this.chunks.get(addr);
      if (chunk) {
        chunk.allocated = true;
        this._writeChunkHeader(addr, chunkSize, true);
        return { addr: addr, dataAddr: addr + this.HEADER_SIZE, dataSize: dataSize };
      }
    }

    // 2. Check fastbin (for sizes <= 64)
    if (chunkSize <= 64 && this.fastbins[chunkSize] && this.fastbins[chunkSize].length > 0) {
      const addr = this.fastbins[chunkSize].pop();
      const chunk = this.chunks.get(addr);
      if (chunk) {
        chunk.allocated = true;
        this._writeChunkHeader(addr, chunkSize, true);
        return { addr: addr, dataAddr: addr + this.HEADER_SIZE, dataSize: dataSize };
      }
    }

    // 3. Check unsorted bin
    for (let i = 0; i < this.unsorted.length; i++) {
      const addr = this.unsorted[i];
      const chunk = this.chunks.get(addr);
      if (chunk && chunk.size >= chunkSize) {
        this.unsorted.splice(i, 1);
        chunk.allocated = true;
        this._writeChunkHeader(addr, chunk.size, true);
        return { addr: addr, dataAddr: addr + this.HEADER_SIZE, dataSize: chunk.size - this.HEADER_SIZE };
      }
    }

    // 4. Carve from top chunk
    if (this.topSize >= chunkSize) {
      const addr = this.topAddr;
      this.topAddr += chunkSize;
      this.topSize -= chunkSize;
      this.chunks.set(addr, { size: chunkSize, allocated: true, dataStart: addr + this.HEADER_SIZE });
      this._writeChunkHeader(addr, chunkSize, true);
      return { addr: addr, dataAddr: addr + this.HEADER_SIZE, dataSize: dataSize };
    }

    return null; // out of memory
  }

  free(addr) {
    // addr is the chunk start (header), not the data pointer
    // If caller passes data pointer, adjust
    let chunkAddr = addr;
    if (!this.chunks.has(addr) && this.chunks.has(addr - this.HEADER_SIZE)) {
      chunkAddr = addr - this.HEADER_SIZE;
    }
    const chunk = this.chunks.get(chunkAddr);
    if (!chunk || !chunk.allocated) return false;

    chunk.allocated = false;
    const chunkSize = chunk.size;
    const dataStart = chunkAddr + this.HEADER_SIZE;

    // Mark chunk as freed in header (clear in-use bit)
    this._writeChunkHeader(chunkAddr, chunkSize, false);

    // 1. Try tcache first (max 7 per bin)
    if (!this.tcache[chunkSize]) this.tcache[chunkSize] = [];
    if (this.tcache[chunkSize].length < 7) {
      // Write fd pointer (points to previous tcache entry or 0)
      const prevFd = this.tcache[chunkSize].length > 0
        ? this.tcache[chunkSize][this.tcache[chunkSize].length - 1] + this.HEADER_SIZE
        : 0;
      this._writeLE(dataStart, prevFd, 4);
      this.written[dataStart] = 1;
      this.written[dataStart + 1] = 1;
      this.written[dataStart + 2] = 1;
      this.written[dataStart + 3] = 1;
      this.tcache[chunkSize].push(chunkAddr);
      return true;
    }

    // 2. Fastbin (if size <= 64)
    if (chunkSize <= 64) {
      if (!this.fastbins[chunkSize]) this.fastbins[chunkSize] = [];
      const prevFd = this.fastbins[chunkSize].length > 0
        ? this.fastbins[chunkSize][this.fastbins[chunkSize].length - 1] + this.HEADER_SIZE
        : 0;
      this._writeLE(dataStart, prevFd, 4);
      this.written[dataStart] = 1;
      this.written[dataStart + 1] = 1;
      this.written[dataStart + 2] = 1;
      this.written[dataStart + 3] = 1;
      this.fastbins[chunkSize].push(chunkAddr);
      return true;
    }

    // 3. Unsorted bin
    const prevFd = this.unsorted.length > 0
      ? this.unsorted[this.unsorted.length - 1] + this.HEADER_SIZE
      : 0;
    this._writeLE(dataStart, prevFd, 4);
    this.written[dataStart] = 1;
    this.written[dataStart + 1] = 1;
    this.written[dataStart + 2] = 1;
    this.written[dataStart + 3] = 1;
    this.unsorted.push(chunkAddr);
    return true;
  }

  _writeChunkHeader(addr, size, inUse) {
    // prev_size (4 bytes) — leave as-is for now
    // size field (4 bytes): actual size | PREV_INUSE flag (bit 0)
    const sizeField = inUse ? (size | 1) : (size & ~1);
    this._writeLE(addr + 4, sizeField, 4);
  }

  write(offset, bytes) {
    for (let i = 0; i < bytes.length && (offset + i) < this.memorySize; i++) {
      this.memory[offset + i] = bytes[i];
      this.written[offset + i] = 1;
    }
  }

  read(offset, size) {
    const result = [];
    for (let i = 0; i < size && (offset + i) < this.memorySize; i++) {
      result.push(this.memory[offset + i]);
    }
    return result;
  }

  getChunksForDisplay() {
    const sorted = Array.from(this.chunks.entries())
      .sort((a, b) => a[0] - b[0])
      .map(([addr, info]) => ({
        addr: addr,
        size: info.size,
        allocated: info.allocated,
        dataStart: addr + this.HEADER_SIZE,
        dataSize: info.size - this.HEADER_SIZE,
        highlighted: addr >= this.highlight.start && addr < this.highlight.end
      }));
    return sorted;
  }

  getFreeLists() {
    return {
      tcache: { ...this.tcache },
      fastbins: { ...this.fastbins },
      unsorted: [...this.unsorted]
    };
  }

  markRegion(start, end) {
    this.highlight = { start: start, end: end };
  }

  clearHighlight() {
    this.highlight = { start: -1, end: -1 };
  }
}

// ──────────────────────────────────────────────
// Hex/address helpers
// ──────────────────────────────────────────────
function hex8(v) { return '0x' + (v >>> 0).toString(16).padStart(8, '0'); }
function hex2(v) { return (v & 0xff).toString(16).padStart(2, '0'); }
function toAscii(v) { return (v >= 0x20 && v <= 0x7e) ? String.fromCharCode(v) : '.'; }
function addrToLE(addrStr) {
  let v = parseInt(addrStr, 16);
  if (isNaN(v)) return null;
  return [(v >>> 0) & 0xff, (v >>> 8) & 0xff, (v >>> 16) & 0xff, (v >>> 24) & 0xff];
}
function hexStrToBytes(str) {
  const clean = str.replace(/\s+/g, '').replace(/^0x/i, '');
  const bytes = [];
  for (let i = 0; i < clean.length; i += 2) {
    const b = parseInt(clean.substr(i, 2), 16);
    if (isNaN(b)) break;
    bytes.push(b);
  }
  return bytes;
}
function strToBytes(str) {
  return Array.from(str).map(c => c.charCodeAt(0) & 0xff);
}

// ──────────────────────────────────────────────
// Rendering
// ──────────────────────────────────────────────

function isExerciseUnlocked(idx) {
  return idx >= 0 && idx < EXERCISES.length;
}

function isUnitComplete(unitId) {
  const unit = UNITS.find(u => u.id === unitId);
  if (!unit || unit.exercises.length === 0) return false;
  return unit.exercises.every(ei => state.completed.has(ei));
}

function renderNav() {
  const nav = document.getElementById('exercise-nav');
  nav.innerHTML = '';

  UNITS.forEach(unit => {
    if (unit.exercises.length === 0) return;

    const label = document.createElement('span');
    label.className = 'nav-unit-label';
    label.textContent = unit.name;
    nav.appendChild(label);

    unit.exercises.forEach(idx => {
      const ex = EXERCISES[idx];
      const btn = document.createElement('button');
      btn.textContent = String(idx + 1).padStart(2, '0');
      btn.title = ex.title;
      btn.dataset.ex = idx;
      if (idx === state.currentEx) btn.classList.add('active');
      if (state.completed.has(idx)) btn.classList.add('completed');
      if (!isExerciseUnlocked(idx) && idx !== state.currentEx) {
        btn.disabled = true;
        btn.title = 'Complete previous exercises to unlock';
      }
      btn.onclick = () => { if (!btn.disabled) loadExercise(idx); };
      nav.appendChild(btn);
    });
  });

  // Sandbox button — appears when Unit 1 is complete
  if (isUnitComplete(1)) {
    const sandboxBtn = document.createElement('button');
    sandboxBtn.textContent = 'SB';
    sandboxBtn.title = 'Sandbox';
    sandboxBtn.dataset.ex = 'sandbox';
    if (state.currentEx === 'sandbox') sandboxBtn.classList.add('active');
    sandboxBtn.onclick = () => loadSandbox();
    nav.appendChild(sandboxBtn);
  }

  renderBadges();
}

function getEarnedBadges() {
  const earned = [];
  // Unit-completion badges (units 1-5)
  for (const unit of UNITS) {
    if (unit.id >= 6 || unit.exercises.length === 0) continue;
    if (unit.exercises.every(ei => state.completed.has(ei))) {
      if (BADGES[unit.id]) earned.push(BADGES[unit.id]);
    }
  }
  // Badge 27: Full Chain — exercise 27 (index 26) complete
  if (state.completed.has(26) && BADGES[27]) earned.push(BADGES[27]);
  // Badge 28: Certified Hacker — all 28 exercises complete
  const allComplete = EXERCISES.every((_, i) => state.completed.has(i));
  if (allComplete && EXERCISES.length >= 28 && BADGES[28]) earned.push(BADGES[28]);
  return earned;
}

function renderBadges() {
  const container = document.getElementById('badges');
  if (!container) return;
  container.innerHTML = '';
  const earned = getEarnedBadges();
  earned.forEach(b => {
    const el = document.createElement('span');
    el.className = 'badge';
    el.textContent = b.icon + ' ' + b.name;
    container.appendChild(el);
  });
}

function saveProgress() {
  try {
    const arr = Array.from(state.completed);
    localStorage.setItem('memcorr-progress', JSON.stringify(arr));
  } catch (e) { /* localStorage unavailable */ }
}

function loadProgress() {
  try {
    const data = localStorage.getItem('memcorr-progress');
    if (data) {
      const arr = JSON.parse(data);
      if (Array.isArray(arr)) {
        arr.forEach(v => state.completed.add(v));
      }
    }
  } catch (e) { /* localStorage unavailable */ }
}

function renderSource(ex) {
  const el = document.getElementById('source-code');
  const desc = document.getElementById('exercise-desc');
  desc.innerHTML = ex.desc;
  el.innerHTML = '';
  ex.code.forEach((line, i) => {
    const span = document.createElement('span');
    span.className = 'src-line ' + (line.cls || '');
    const ln = document.createElement('span');
    ln.className = 'ln';
    ln.textContent = i + 1;
    span.appendChild(ln);
    let html = line.text
      .replace(/\b(void|int|char|return|include|printf)\b/g, '<span class="src-kw">$1</span>')
      .replace(/\b(gets)\b/g, '<span class="src-vuln">$1</span>')
      .replace(/"([^"]*)"/g, '<span class="src-str">"$1"</span>')
      .replace(/\b(main|vuln|win|normal)\b(?=\s*\()/g, '<span class="src-fn">$1</span>')
      .replace(/(\/\/.*)$/g, '<span class="src-cmt">$1</span>');
    const code = document.createElement('span');
    code.innerHTML = html;
    span.appendChild(code);
    el.appendChild(span);
  });
}

function renderStack() {
  const sim = state.sim;
  if (!sim) return;
  const el = document.getElementById('stack-viz');
  el.innerHTML = '';

  const rowSize = 4;
  const numRows = Math.ceil(sim.totalSize / rowSize);

  for (let r = numRows - 1; r >= 0; r--) {
    const offset = r * rowSize;
    const addr = sim.baseAddr + offset;

    const row = document.createElement('div');
    row.className = 'stack-row';
    const region = sim.regionOf(offset);
    row.classList.add('region-' + region);
    if (offset === 0 || offset === sim.bufSize ||
        (sim.useCanary && offset === sim.bufSize + sim.canarySize) ||
        offset === sim.bufSize + sim.canarySize + 4) {
      row.classList.add('region-start');
    }

    const addrEl = document.createElement('span');
    addrEl.className = 'stack-addr';
    addrEl.textContent = hex8(addr);
    row.appendChild(addrEl);

    const bytesEl = document.createElement('span');
    bytesEl.className = 'stack-bytes';
    let asciiStr = '';
    for (let b = 0; b < rowSize; b++) {
      const idx = offset + b;
      const byteEl = document.createElement('span');
      byteEl.className = 'stack-byte';
      if (idx < sim.totalSize) {
        byteEl.textContent = hex2(sim.memory[idx]);
        asciiStr += toAscii(sim.memory[idx]);
        if (sim.overflowAt[idx]) byteEl.classList.add('overflow');
        if (sim.written[idx]) byteEl.classList.add('just-written');
        if (idx >= sim.hlStart && idx < sim.hlEnd) byteEl.classList.add('current');
      } else {
        byteEl.textContent = '--';
        byteEl.classList.add('empty');
        asciiStr += ' ';
      }
      bytesEl.appendChild(byteEl);
    }
    row.appendChild(bytesEl);

    const asciiEl = document.createElement('span');
    asciiEl.className = 'stack-ascii';
    asciiEl.textContent = asciiStr;
    row.appendChild(asciiEl);

    const labelEl = document.createElement('span');
    labelEl.className = 'stack-label';
    const retStart = sim.bufSize + sim.canarySize + 4;
    if (offset === retStart) {
      const retVal = sim.getRetAddr();
      labelEl.innerHTML = '← <span style="color:var(--amber)">Go-Back Address</span> = ' + hex8(retVal);
    } else if (offset === retStart + 4 && sim.totalSize > retStart + 4) {
      labelEl.innerHTML = '← <span style="color:var(--text-dim)">chain data (system ret / gadget args)</span>';
    } else if (offset > retStart + 4 && offset < sim.totalSize) {
      labelEl.innerHTML = '<span style="color:var(--text-dim)">chain data</span>';
    } else if (offset === sim.bufSize + sim.canarySize) {
      labelEl.innerHTML = '← <span style="color:var(--blue)">Saved Bookmark (EBP)</span>';
    } else if (sim.useCanary && offset === sim.bufSize) {
      const intact = sim.canaryIntact();
      labelEl.innerHTML = '← <span style="color:var(--purple)">Tripwire (Canary)</span> ' +
        (intact ? '<span style="color:var(--green)">✓ intact</span>' : '<span style="color:var(--red)">✗ CORRUPTED</span>');
    } else if (offset === 0) {
      labelEl.innerHTML = '← <span style="color:var(--green)">buf[0]</span> (write starts here)';
    } else if (offset < sim.bufSize) {
      labelEl.innerHTML = '<span style="color:var(--text-dim)">buf[' + offset + '..' + Math.min(offset + 3, sim.bufSize - 1) + ']</span>';
    }
    row.appendChild(labelEl);

    el.appendChild(row);
  }

  const info = document.getElementById('stack-info');
  const canaryLabel = sim.useCanary ? ' + tripwire[4]' : '';
  info.textContent = '— ' + sim.totalSize + ' bytes total: buffer[' + sim.bufSize + ']' + canaryLabel + ' + bookmark[4] + go-back addr[4]';
}

function renderHeap() {
  const heap = state.heap;
  if (!heap) return;
  const el = document.getElementById('heap-viz');
  if (!el) return;
  el.innerHTML = '';

  const chunks = heap.getChunksForDisplay();
  const freeLists = heap.getFreeLists();

  // Build a set of freed chunk data addresses for pointer detection
  const freedDataAddrs = new Set();
  chunks.forEach(c => { if (!c.allocated) freedDataAddrs.add(c.dataStart); });

  // --- Chunk strip ---
  const strip = document.createElement('div');
  strip.className = 'heap-memory-strip';

  const curExForStrip = typeof state.currentEx === 'number' ? EXERCISES[state.currentEx] : null;
  const blindMode = curExForStrip && curExForStrip.showLabels === false;

  chunks.forEach(chunk => {
    const chunkEl = document.createElement('div');
    chunkEl.className = 'heap-chunk';
    if (!blindMode) {
      if (chunk.allocated) chunkEl.classList.add('allocated');
      else chunkEl.classList.add('freed');
    }
    if (chunk.highlighted) chunkEl.classList.add('highlighted');

    // Header row
    const hdr = document.createElement('div');
    hdr.className = 'heap-chunk-header';
    const prevSizeVal = heap._readLE(chunk.addr, 4);
    const sizeFieldVal = heap._readLE(chunk.addr + 4, 4);
    const rawSize = sizeFieldVal & ~7;
    const prevInUse = sizeFieldVal & 1;

    if (blindMode) {
      // Show raw header bytes only
      const hdrBytes = [];
      for (let i = 0; i < 8 && (chunk.addr + i) < heap.memorySize; i++) {
        hdrBytes.push(hex2(heap.memory[chunk.addr + i]));
      }
      hdr.textContent = hdrBytes.join(' ');
      hdr.style.fontFamily = 'var(--font)';
      hdr.style.fontSize = '11px';
      hdr.style.color = 'var(--text-dim)';
    } else {
      const ps = document.createElement('span');
      ps.className = 'prev-size';
      ps.textContent = 'ps:' + prevSizeVal;
      hdr.appendChild(ps);

      const sz = document.createElement('span');
      sz.className = 'size-field';
      sz.textContent = 'sz:' + rawSize;
      hdr.appendChild(sz);

      const fl = document.createElement('span');
      fl.className = 'flags';
      fl.textContent = prevInUse ? 'P' : '';
      hdr.appendChild(fl);
    }

    chunkEl.appendChild(hdr);

    // Data bytes (show first 32 max)
    const dataEl = document.createElement('div');
    dataEl.className = 'heap-chunk-data';
    const showBytes = Math.min(chunk.dataSize, 32);

    for (let i = 0; i < showBytes; i++) {
      const byteIdx = chunk.dataStart + i;
      const byteEl = document.createElement('span');
      byteEl.className = 'byte';
      if (byteIdx < heap.memorySize) {
        byteEl.textContent = hex2(heap.memory[byteIdx]);
        if (blindMode) {
          // No color coding — all bytes look the same
          byteEl.style.color = 'var(--text-dim)';
        } else if (chunk.allocated) {
          byteEl.classList.add('allocated');
        } else {
          // First 4 bytes of freed chunk = fd pointer
          if (i < 4) byteEl.classList.add('pointer');
          else byteEl.classList.add('freed');
        }
      } else {
        byteEl.textContent = '--';
        byteEl.classList.add('freed');
      }
      dataEl.appendChild(byteEl);
    }
    if (chunk.dataSize > 32) {
      const more = document.createElement('span');
      more.className = 'byte freed';
      more.textContent = '...';
      dataEl.appendChild(more);
    }
    chunkEl.appendChild(dataEl);

    // Label (include name if we have one)
    const curEx = typeof state.currentEx === 'number' ? EXERCISES[state.currentEx] : null;
    const hideLabels = curEx && curEx.showLabels === false;
    const label = document.createElement('div');
    label.className = 'heap-chunk-label';
    const displayAddr = heap.baseAddr + chunk.addr;
    if (hideLabels) {
      label.textContent = hex8(displayAddr);
    } else {
      let chunkLabel = hex8(displayAddr) + ' (' + chunk.dataSize + 'B)';
      if (state.heapNames) {
        const nameEntry = Object.entries(state.heapNames).find(([, a]) => a === chunk.addr);
        if (nameEntry) chunkLabel = nameEntry[0] + ' \u2014 ' + chunkLabel;
      }
      label.textContent = chunkLabel;
    }
    chunkEl.appendChild(label);

    strip.appendChild(chunkEl);
  });

  // Top chunk indicator
  if (heap.topSize > 0) {
    const topEl = document.createElement('div');
    topEl.className = 'heap-top-chunk';
    topEl.textContent = blindMode ? hex8(heap.baseAddr + heap.topAddr) + ' ...' : 'Top chunk (' + heap.topSize + ' bytes free)';
    strip.appendChild(topEl);
  }

  el.appendChild(strip);

  // --- Recycling Lists (free lists) --- hide in blind mode
  if (blindMode) return;

  const listsEl = document.createElement('div');
  listsEl.className = 'free-lists';
  const listsTitle = document.createElement('h4');
  listsTitle.textContent = 'Recycling Lists (freed chunks)';
  listsEl.appendChild(listsTitle);

  function renderFreeListSection(name, bins) {
    const keys = Object.keys(bins).sort((a, b) => Number(a) - Number(b));
    if (keys.length === 0) return;

    keys.forEach(size => {
      const addrs = bins[size];
      if (!addrs || addrs.length === 0) return;
      const row = document.createElement('div');
      row.className = 'free-list-row';

      const nameEl = document.createElement('span');
      nameEl.className = 'free-list-name';
      nameEl.textContent = name + '[' + size + ']';
      row.appendChild(nameEl);

      addrs.forEach((addr, i) => {
        if (i > 0) {
          const arrow = document.createElement('span');
          arrow.className = 'free-list-arrow';
          arrow.textContent = ' \u2192 ';
          row.appendChild(arrow);
        }
        const node = document.createElement('span');
        node.className = 'free-list-node';
        const addrEl = document.createElement('span');
        addrEl.className = 'free-list-addr';
        addrEl.textContent = hex8(heap.baseAddr + addr);
        node.appendChild(addrEl);
        row.appendChild(node);
      });

      const arrow = document.createElement('span');
      arrow.className = 'free-list-arrow';
      arrow.textContent = ' \u2192 ';
      row.appendChild(arrow);
      const nilEl = document.createElement('span');
      nilEl.className = 'free-list-nil';
      nilEl.textContent = 'NULL';
      row.appendChild(nilEl);

      listsEl.appendChild(row);
    });
  }

  renderFreeListSection('tcache', freeLists.tcache);
  renderFreeListSection('fastbin', freeLists.fastbins);

  if (freeLists.unsorted.length > 0) {
    const row = document.createElement('div');
    row.className = 'free-list-row';
    const nameEl = document.createElement('span');
    nameEl.className = 'free-list-name';
    nameEl.textContent = 'unsorted';
    row.appendChild(nameEl);

    freeLists.unsorted.forEach((addr, i) => {
      if (i > 0) {
        const arrow = document.createElement('span');
        arrow.className = 'free-list-arrow';
        arrow.textContent = ' \u2192 ';
        row.appendChild(arrow);
      }
      const node = document.createElement('span');
      node.className = 'free-list-node';
      const addrEl = document.createElement('span');
      addrEl.className = 'free-list-addr';
      addrEl.textContent = hex8(heap.baseAddr + addr);
      node.appendChild(addrEl);
      row.appendChild(node);
    });

    const arrow = document.createElement('span');
    arrow.className = 'free-list-arrow';
    arrow.textContent = ' \u2192 ';
    row.appendChild(arrow);
    const nilEl = document.createElement('span');
    nilEl.className = 'free-list-nil';
    nilEl.textContent = 'NULL';
    row.appendChild(nilEl);

    listsEl.appendChild(row);
  }

  el.appendChild(listsEl);

  // --- Function pointer table ---
  const ptrKeys = Object.keys(heap.funcPtrs);
  if (ptrKeys.length > 0) {
    const tbl = document.createElement('div');
    tbl.className = 'func-ptr-table';
    const tblTitle = document.createElement('h4');
    tblTitle.textContent = 'Function Pointers';
    tbl.appendChild(tblTitle);

    ptrKeys.forEach(name => {
      const entry = heap.funcPtrs[name];
      const row = document.createElement('div');
      row.className = 'func-ptr-row';

      const nameEl = document.createElement('span');
      nameEl.className = 'func-ptr-name';
      nameEl.textContent = name;
      row.appendChild(nameEl);

      const valEl = document.createElement('span');
      valEl.className = 'func-ptr-val';
      const currentVal = entry.current !== undefined ? entry.current : entry.original;
      valEl.textContent = hex8(currentVal);
      if (entry.original !== undefined && currentVal !== entry.original) {
        valEl.classList.add('overwritten');
      }
      row.appendChild(valEl);

      tbl.appendChild(row);
    });

    el.appendChild(tbl);
  }
}

function renderHeapAndStack() {
  // Split view: heap on top, stack on bottom
  renderHeap();
  renderStack();
}

function renderViz() {
  const ex = typeof state.currentEx === 'number' ? EXERCISES[state.currentEx] : null;
  const vizMode = ex ? (ex.vizMode || 'stack') : 'stack';

  const stackEl = document.getElementById('stack-viz');
  const heapEl = document.getElementById('heap-viz');

  if (vizMode === 'heap') {
    if (stackEl) stackEl.style.display = 'none';
    if (heapEl) heapEl.style.display = '';
    renderHeap();
  } else if (vizMode === 'both') {
    if (stackEl) stackEl.style.display = '';
    if (heapEl) heapEl.style.display = '';
    renderHeapAndStack();
  } else {
    // Default: stack only
    if (stackEl) stackEl.style.display = '';
    if (heapEl) heapEl.style.display = 'none';
    renderStack();
  }
}

        style="width:100%;background:#0a0a0a;border:1px solid var(--panel-border);color:var(--text);font-family:var(--font);font-size:13px;padding:0.5rem;resize:none;margin-top:0.35rem"></textarea>

        <button onclick="doReset()">Reset</button>
      </div>
    `;
    state.inputMode = 'hex';
    builder.style.display = 'none';
    renderHeapSymbols(syms, ex);

    area.innerHTML = `

          style="width:100%;background:#0a0a0a;border:1px solid var(--panel-border);color:var(--text);font-family:var(--font);font-size:13px;padding:0.5rem;resize:none;margin-top:0.35rem"></textarea>
        <div class="controls" style="margin-top:0.5rem">
          <button class="primary" onclick="blindPoisonSubmit()">read(0, ptrs[2], 32)</button>
          <button onclick="doReset()">Reset</button>
        </div>
      </div>
      <div id="blind-write-area" ${inWrite ? '' : 'style="display:none"'}>
        <label style="font-size:11px;color:var(--text-dim)">Two mallocs done. y points to your poisoned address. Write 4 bytes to y:</label>
        <textarea id="payload-input" placeholder="Enter 4 hex bytes..." rows="1"
          style="width:100%;background:#0a0a0a;border:1px solid var(--panel-border);color:var(--text);font-family:var(--font);font-size:13px;padding:0.5rem;resize:none;margin-top:0.35rem"></textarea>
        <div class="controls" style="margin-top:0.5rem">
          <button class="primary" onclick="blindWriteSubmit()">read(0, y, 4)</button>
          <button onclick="doReset()">Reset</button>
        </div>
      </div>
      <div id="blind-exec-area" ${inExec ? '' : 'style="display:none"'}>
        <label style="font-size:11px;color:var(--text-dim)">ptrs[0]->fn() is about to be called.</label>
        <div class="controls" style="margin-top:0.5rem">
          <button class="primary" onclick="blindExecSubmit()">ptrs[0]->fn()</button>
          <button onclick="doReset()">Reset</button>
        </div>
      </div>
    `;
    state.inputMode = 'hex';
    builder.style.display = 'none';
    syms.style.display = 'none';
    return;
  }

  let modeHtml = '';
  if (ex.mode === 'input-hex') {
    modeHtml = `
      <div class="input-mode-toggle">
        <button class="${state.inputMode === 'text' ? 'active' : ''}" onclick="setInputMode('text')">ASCII</button>
        <button class="${state.inputMode === 'hex' ? 'active' : ''}" onclick="setInputMode('hex')">Hex</button>
      </div>
    `;
  }

  const placeholder = state.inputMode === 'hex'
    ? 'Enter hex bytes: 41 41 41 41 ...'
    : 'Type your input...';

  area.innerHTML = `
    ${modeHtml}
    <label>Your input (${state.inputMode === 'hex' ? 'hex bytes, space-separated' : 'text'}):</label>
    <textarea id="payload-input" placeholder="${placeholder}" oninput="onPayloadInput()" rows="2"></textarea>
    <div id="step-counter" style="font-size:11px;color:var(--text-dim);margin-top:0.5rem;min-height:1.2em"></div>
    <div class="controls" style="margin-top:0.25rem">
      <button class="primary" onclick="doStep()">Step →</button>
      <button onclick="doRunAll()">Run ▶▶</button>
      <button onclick="doReset()">Reset</button>
    </div>
  `;

  if (ex.showBuilder) {
    builder.style.display = 'block';
    const canaryRow = state.sim.useCanary ? `
      <div class="builder-row">
        <label style="color:var(--purple)">Tripwire value (4 bytes):</label>
        <input id="b-canary" placeholder="0x????????" oninput="buildPayload()">
        <span class="hint">check the execution log for the leaked value</span>
      </div>` : '';
    builder.innerHTML = `
      <h4>Payload Builder</h4>
      <div class="builder-row">
        <label>Padding (${state.sim.bufSize} bytes):</label>
        <input id="b-pad" value="${'A'.repeat(state.sim.bufSize)}" oninput="buildPayload()">
        <span class="hint">fills the buffer</span>
      </div>
      ${canaryRow}
      <div class="builder-row">
        <label>Junk (4 bytes):</label>
        <input id="b-ebp" value="BBBB" oninput="buildPayload()">
        <span class="hint">overwrites the saved bookmark — anything works</span>
      </div>
      <div class="builder-row">
        <label>Target address:</label>
        <input id="b-addr" placeholder="0x????????" oninput="buildPayload()">
        <span class="hint">→ written backwards! (little-endian)</span>
      </div>
      <div style="margin-top:0.35rem">
        <button onclick="useBuiltPayload()" style="background:transparent;border:1px solid var(--green);color:var(--green);font-family:var(--font);font-size:11px;padding:0.2rem 0.5rem;cursor:pointer">
          Copy to input ↑
        </button>
      </div>
      <div id="built-payload"></div>
    `;
    buildPayload();
  } else {
    builder.style.display = 'none';
  }

  const calc = document.getElementById('hex-calc');
  if (ex.showCalc) {
    calc.style.display = 'block';
    calc.innerHTML = `
      <h4>Hex Calculator</h4>
      <div class="calc-row">
        <input id="calc-a" placeholder="0x????????" oninput="calcHex()">
        <span class="calc-op" id="calc-op-btn" onclick="toggleCalcOp()" title="click to toggle" style="cursor:pointer">+</span>
        <input id="calc-b" placeholder="0x150" oninput="calcHex()">
        <span class="calc-eq">=</span>
        <span id="calc-result">—</span>
      </div>
      <div class="calc-hint">Paste the leaked main() address in the first box, put the offset to win (0x150) in the second, and you'll get win's real address. Click +/− to switch between add and subtract.</div>
    `;
  } else {
    calc.style.display = 'none';
  }

  if (ex.showSymbols) {
    syms.style.display = 'block';
    let html = '<h4>Functions In The Program</h4>';
    for (const [name, addr] of Object.entries(state.symbols)) {
      const isTarget = name === 'win';
      const note = isTarget ? '← jump here!' : (name === 'system' ? '← call this' : (name === 'binsh' ? '← argument for system()' : ''));
      html += `<div class="sym-row ${isTarget ? 'target' : ''}">
        <span class="sym-name">${name === 'binsh' ? '"/bin/sh"' : name + '()'}</span>
        <span class="sym-addr">${hex8(addr)}</span>
        <span class="sym-note">${note}</span>
      </div>`;
    }
    syms.innerHTML = html;
  } else {
    syms.style.display = 'none';
  }

  // Gadget table
  const gadgetDiv = document.getElementById('gadget-table');
  if (ex.showGadgetTable && ex.gadgets) {
    gadgetDiv.style.display = 'block';
    let ghtml = '<h4>Available Gadgets (click to add address to payload)</h4>';
    for (const [addr, asm] of Object.entries(ex.gadgets)) {
      const addrNum = parseInt(addr);
      ghtml += `<div class="gadget-row" onclick="appendGadgetAddr('${hex8(addrNum)}')">
        <span class="gadget-addr">${hex8(addrNum)}</span>
        <span class="gadget-asm">${asm}</span>
      </div>`;
    }
    gadgetDiv.innerHTML = ghtml;
  } else {
    gadgetDiv.style.display = 'none';
  }

  // Register display
  const regDiv = document.getElementById('register-display');
  if (ex.rop || ex.srop) {
    regDiv.style.display = 'grid';
    renderRegisters();
  } else {
    regDiv.style.display = 'none';
  }

  // Sigframe builder
  const sigDiv = document.getElementById('sigframe-builder');
  if (ex.showSigframe) {
    sigDiv.style.display = 'block';
    sigDiv.innerHTML = `
      <h4>Signal Frame Builder</h4>
      <div style="color:var(--text-dim);margin-bottom:0.5rem">Set register values for the fake signal frame. EIP controls where the program jumps.</div>
      <div class="sigframe-row"><label>EIP:</label><input id="sf-eip" placeholder="0x08048150"></div>
      <div class="sigframe-row"><label>ESP:</label><input id="sf-esp" placeholder="0xbfff0200" value="0xbfff0200"></div>
      <div class="sigframe-row"><label>EAX:</label><input id="sf-eax" placeholder="0x00000000" value="0x00000000"></div>
      <div class="sigframe-row"><label>EBX:</label><input id="sf-ebx" placeholder="0x00000000" value="0x00000000"></div>
      <div class="sigframe-row"><label>ECX:</label><input id="sf-ecx" placeholder="0x00000000" value="0x00000000"></div>
      <div class="sigframe-row"><label>EDX:</label><input id="sf-edx" placeholder="0x00000000" value="0x00000000"></div>
      <div style="margin-top:0.5rem">
        <button onclick="buildSigframe()" style="background:transparent;border:1px solid var(--green);color:var(--green);font-family:var(--font);font-size:11px;padding:0.2rem 0.5rem;cursor:pointer">
          Build Frame &amp; Copy to Input ↑
        </button>
      </div>
      <div id="sigframe-preview" style="color:var(--yellow);word-break:break-all;margin-top:0.5rem;padding:0.35rem;background:#0a0a0a;min-height:1.5em;font-size:10px"></div>
    `;
  } else {
    sigDiv.style.display = 'none';
  }
}

function renderLog() {
  const el = document.getElementById('exec-log');
  el.innerHTML = '';
  state.logMessages.forEach(([cls, msg]) => {
    const div = document.createElement('div');
    div.className = 'log-entry log-' + cls;
    div.innerHTML = msg;
    el.appendChild(div);
  });
  el.scrollTop = el.scrollHeight;
}

// ──────────────────────────────────────────────
// Exercise loading
// ──────────────────────────────────────────────
function randomizeAddresses() {
  const base = 0x56550000 + (Math.floor(Math.random() * 0x1000) << 4);
  state.symbols = {
    main:   base + 0x000,
    vuln:   base + 0x054,
    win:    base + 0x150,
    normal: base + 0x0a0,
  };
  state.aslrBase = base;
}

function loadExercise(idx) {
  state.currentEx = idx;
  const ex = EXERCISES[idx];

  if (ex.aslr) {
    randomizeAddresses();
  } else {
    state.symbols = { ...BASE_SYMBOLS };
  }

  const retAddr = retAddrInMain();
  const savedEbp = 0xbfff0200;
  // Add sigreturn to symbols for SROP exercise
  if (ex.srop) {
    state.symbols.sigreturn = 0x080481b0;
  }

  state.sim = new StackSim(ex.bufSize || 16, retAddr, savedEbp, undefined, ex.canary);

  // Extend sim memory for exercises needing space past the return address
  let extraBytes = 0;
  if (ex.ret2libc) extraBytes = 8;  // system's fake return + arg
  if (ex.rop && !ex.pivot) extraBytes = 28; // gadget1 + val + gadget2 + val + gadget3 + win = 6 words
  if (ex.pivot) extraBytes = 12; // pop eax;ret + buf_addr + xchg;ret (chain is in buffer)
  if (ex.srop) extraBytes = 24; // signal frame: 6 registers * 4 bytes
  if (extraBytes > 0) {
    const oldTotal = state.sim.totalSize;
    const newTotal = oldTotal + extraBytes;
    const newMem = new Uint8Array(newTotal);
    const newWritten = new Uint8Array(newTotal);
    const newOverflow = new Uint8Array(newTotal);
    newMem.set(state.sim.memory);
    newWritten.set(state.sim.written);
    newOverflow.set(state.sim.overflowAt);
    state.sim.memory = newMem;
    state.sim.written = newWritten;
    state.sim.overflowAt = newOverflow;
    state.sim.totalSize = newTotal;
  }

  // Initialize heap if exercise uses it
  state.heap = null;
  state.heapNames = {};
  state.heapStep = 0;
  state.heapPhase = 'guided'; // 'guided' or 'input'
  if (ex.vizMode === 'heap' || ex.vizMode === 'both') {
    state.heap = new HeapSim(ex.heapSize || 512);
    if (ex.heapSetup) ex.heapSetup(state.heap);
  }

  // Heap exercise setup
  if (ex.mode === 'heap-uaf' && state.heap) {
    // malloc User, set funcPtr, keep track
    const userAlloc = state.heap.malloc(16);
    if (userAlloc) {
      state.heapNames['User'] = userAlloc.addr;
      state.heap.funcPtrs.action = { original: state.symbols.normal, current: state.symbols.normal };
      // Write the function pointer into the chunk data
      state.heap._writeLE(userAlloc.dataAddr, state.symbols.normal, 4);
      for (let i = 0; i < 4; i++) state.heap.written[userAlloc.dataAddr + i] = 1;
    }
  }

  if (ex.mode === 'heap-double-free' && state.heap) {
    const aAlloc = state.heap.malloc(16);
    if (aAlloc) {
      state.heapNames['A'] = aAlloc.addr;
    }
    state.heap.funcPtrs.handler = { original: state.symbols.normal, current: state.symbols.normal };
  }

  if (ex.mode === 'heap-overflow' && state.heap) {
    const aAlloc = state.heap.malloc(16);
    const bAlloc = state.heap.malloc(16);
    if (aAlloc) state.heapNames['A'] = aAlloc.addr;
    if (bAlloc) {
      state.heapNames['B'] = bAlloc.addr;
      // Write normal() function pointer as first 4 bytes of B's data
      state.heap._writeLE(bAlloc.dataAddr, state.symbols.normal, 4);
      for (let i = 0; i < 4; i++) state.heap.written[bAlloc.dataAddr + i] = 1;
      state.heap.funcPtrs.handler = { original: state.symbols.normal, current: state.symbols.normal };
    }
  }

  if (ex.mode === 'heap-tcache-poison' && state.heap) {
    const aAlloc = state.heap.malloc(16);
    const bAlloc = state.heap.malloc(16);
    if (aAlloc) state.heapNames['A'] = aAlloc.addr;
    if (bAlloc) state.heapNames['B'] = bAlloc.addr;
    state.heap.funcPtrs.handler = { original: state.symbols.normal, current: state.symbols.normal };
  }

  if (ex.mode === 'heap-fastbin-dup' && state.heap) {
    // Pre-fill tcache: allocate 7 chunks, free them all to fill tcache[24]
    const tcFills = [];
    for (let i = 0; i < 7; i++) {
      const r = state.heap.malloc(16);
      if (r) tcFills.push(r);
    }
    // Allocate A and B
    const aAlloc = state.heap.malloc(16);
    const bAlloc = state.heap.malloc(16);
    if (aAlloc) state.heapNames['A'] = aAlloc.addr;
    if (bAlloc) state.heapNames['B'] = bAlloc.addr;
    // Free the 7 chunks to fill tcache
    for (const r of tcFills) {
      state.heap.free(r.addr);
    }
    state.heap.funcPtrs.handler = { original: state.symbols.normal, current: state.symbols.normal };
  }

  if (ex.mode === 'heap-unsorted-bin' && state.heap) {
    const aAlloc = state.heap.malloc(128);
    const guardAlloc = state.heap.malloc(16);
    if (aAlloc) state.heapNames['A'] = aAlloc.addr;
    if (guardAlloc) state.heapNames['Guard'] = guardAlloc.addr;
    state.heap.funcPtrs.handler = { original: state.symbols.normal, current: state.symbols.normal };
  }

  if (ex.mode === 'heap-house-force' && state.heap) {
    const aAlloc = state.heap.malloc(16);
    if (aAlloc) state.heapNames['A'] = aAlloc.addr;
    state.heap.funcPtrs.handler = { original: state.symbols.normal, current: state.symbols.normal };
  }

  if (ex.mode === 'heap-house-spirit' && state.heap) {
    // Reserve a region of heap memory to simulate a "stack buffer"
    // We'll use the first 64 bytes of heap as the fake stack area
    state.spiritStackAddr = 0; // offset in heap memory
    state.spiritFakeChunkAddr = 0; // will be set when user writes headers
    state.heap.funcPtrs.handler = { original: state.symbols.normal, current: state.symbols.normal };
  }

  if (ex.mode === 'heap-house-orange' && state.heap) {
    const aAlloc = state.heap.malloc(16);
    if (aAlloc) state.heapNames['A'] = aAlloc.addr;
    state.heap.funcPtrs.handler = { original: state.symbols.normal, current: state.symbols.normal };
  }

  if (ex.mode === 'heap-house-einherjar' && state.heap) {
    const aAlloc = state.heap.malloc(16);
    const bAlloc = state.heap.malloc(16);
    const cAlloc = state.heap.malloc(16);
    const guardAlloc = state.heap.malloc(16);
    if (aAlloc) state.heapNames['A'] = aAlloc.addr;
    if (bAlloc) state.heapNames['B'] = bAlloc.addr;
    if (cAlloc) state.heapNames['C'] = cAlloc.addr;
    if (guardAlloc) state.heapNames['Guard'] = guardAlloc.addr;
    state.heap.funcPtrs.handler = { original: state.symbols.normal, current: state.symbols.normal };
  }

  if (ex.mode === 'heap-house-lore' && state.heap) {
    // Allocate a chunk big enough for smallbin (>64 bytes), plus a guard
    const aAlloc = state.heap.malloc(80);
    const guardAlloc = state.heap.malloc(16);
    if (aAlloc) state.heapNames['A'] = aAlloc.addr;
    if (guardAlloc) state.heapNames['Guard'] = guardAlloc.addr;
    state.heap.funcPtrs.handler = { original: state.symbols.normal, current: state.symbols.normal };
  }

  if (ex.mode === 'final-chain' && state.heap) {
    // Don't allocate yet — Phase 1 determines the allocation size
    state.heapPhase = 'count';
    state.chainBufSize = 0;
    state.chainBufAddr = null;
    state.chainCfgAddr = null;
    state.heap.funcPtrs.handler = { original: state.symbols.normal, current: state.symbols.normal };
  }

  if (ex.mode === 'final-blind' && state.heap) {
    // Allocate 4 chunks of 32 bytes
    const ptrs = [];
    for (let i = 0; i < 4; i++) {
      const r = state.heap.malloc(32);
      if (r) ptrs.push(r);
    }
    state.blindPtrs = ptrs;
    // Set ptrs[0]->fn = normal
    if (ptrs[0]) {
      state.heap._writeLE(ptrs[0].dataAddr, state.symbols.normal, 4);
      for (let i = 0; i < 4; i++) state.heap.written[ptrs[0].dataAddr + i] = 1;
      state.heap.funcPtrs.fn = { original: state.symbols.normal, current: state.symbols.normal };
    }
    state.heapPhase = 'guided';
    state.heapStep = 0;
    state.blindYAddr = null;
  }

  state.stepIndex = 0;
  state.execSteps = null;
  state.execIndex = 0;
  state.running = false;
  state.inputMode = ex.mode === 'input-hex' ? 'hex' : 'text';
  state.logMessages = [];
  state.fmtLeakedSecret = false;
  state.fmtWriteSuccess = false;
  state.oboWin = false;
  state.ropWin = false;
  state.sropWin = false;
  state.ropEax = 0;
  state.ropEbx = 0;
  state.ropFlagValue = 0;

  // Initialize registers for ROP/SROP exercises
  if (ex.rop || ex.srop) {
    state.registers = { eax: 0, ebx: 0, ecx: 0, edx: 0, esp: 0, ebp: 0, eip: 0, eflags: 0 };
  }

  log('info', '═══ ' + ex.title + ' ═══');

  if (ex.mode === 'step') {
    state.sim.written.fill(0);
    const blank = new Uint8Array(state.sim.totalSize);
    state.sim.memory = blank;
    state.sim._writeLE = StackSim.prototype._writeLE.bind(state.sim);
    log('info', 'Click Step to see how the program sets up memory for this function.');
  }

  if (ex.aslr) {
    log('info', 'ASLR is on — addresses are shuffled every time the program runs.');
    log('warn', 'DEBUG: main() is at <span class="log-addr">' + hex8(state.symbols.main) + '</span> <span class="log-label">← the program accidentally leaked this!</span>');
    log('info', 'From the program file, we know: main is at offset +0x000, vuln at +0x054, win at +0x150');
  }

  if (ex.canary && state.sim.useCanary) {
    log('warn', 'Bug leaked the secret tripwire value: <span class="log-addr">' + hex8(state.sim.canaryValue) + '</span> <span class="log-label">← this is the canary!</span>');
    log('info', 'The tripwire sits right after the buffer. Your payload needs: [' + state.sim.bufSize + ' bytes filler] [4 bytes canary] [4 bytes junk] [4 bytes target address]');
  }

  if (ex.ret2libc) {
    log('info', 'NX is ON — the stack won\'t run code. But system() and "/bin/sh" are in memory!');
    log('info', 'Payload layout: [' + ex.bufSize + ' bytes padding] [4 bytes junk EBP] [system() address] [fake return addr — anything] ["/bin/sh" address]');
    log('info', 'When vuln() returns to system(), the CPU thinks system() was called normally. It reads the next word as system\'s own return address (we don\'t care), and the word after that as system\'s argument.');
  }

  if (ex.rop && !ex.pivot) {
    log('info', 'NX is ON — no running code on the stack. Use ROP gadgets instead!');
    log('info', 'Each gadget is a tiny snippet ending in "ret". When one gadget\'s ret executes, it pops the next address from the stack and jumps there — chaining them together.');
    log('info', 'Goal: write 0xdeadbeef to flag_check (' + hex8(ex.flagAddr) + '), then jump to win().');
    log('info', 'Chain: [padding] [junk EBP] [pop eax;ret] [0xdeadbeef] [pop ebx;ret] [flag_check addr] [mov [ebx],eax;ret] [win()]');
  }

  if (ex.pivot) {
    log('info', 'The overflow only gives you a few words past the go-back address — not enough for a full chain.');
    log('info', 'But the buffer is at a known address: <span class="log-addr">' + hex8(state.sim.baseAddr) + '</span>');
    log('info', 'Put your ROP chain inside the buffer. Then in the overflow: [junk EBP] [pop eax;ret] [buffer addr] [xchg eax,esp;ret]');
    log('info', 'The xchg swaps EAX and ESP — moving the stack pointer to your buffer, where your full chain waits!');
  }

  if (ex.srop) {
    log('info', 'NX is ON. We have a sigreturn gadget at <span class="log-addr">' + hex8(state.symbols.sigreturn) + '</span>');
    log('info', 'When the OS delivers a signal, it saves all registers in a "signal frame" on the stack. sigreturn() reads that frame and restores every register.');
    log('info', 'If we put a FAKE signal frame on the stack and call sigreturn, we control every register — including EIP (where the program jumps next)!');
    log('info', 'Use the Signal Frame Builder below to set EIP to win(), then build your payload.');
  }

  if (ex.mode === 'heap-uaf') {
    log('info', 'A User struct has been allocated with a function pointer set to greet() (<span class="log-addr">' + hex8(state.symbols.normal) + '</span>).');
    log('info', 'win() is at <span class="log-addr">' + hex8(state.symbols.win) + '</span> — overwrite the function pointer to jump there!');
    log('info', 'Click Step to walk through the vulnerability, then enter your payload.');
  }

  if (ex.mode === 'heap-double-free') {
    log('info', 'Chunk A has been allocated. We will free it twice to corrupt the recycling list.');
    log('info', 'The function pointer table (handler) is at <span class="log-addr">' + hex8(ex.funcPtrAddr) + '</span>');
    log('info', 'win() is at <span class="log-addr">' + hex8(state.symbols.win) + '</span>');
    log('info', 'Click Step to walk through the double free, then enter the target address.');
  }

  if (ex.mode === 'heap-overflow') {
    log('info', 'Two chunks are allocated side-by-side: A (your input) and B (holds a function pointer).');
    log('info', 'B\'s function pointer is set to normal() (<span class="log-addr">' + hex8(state.symbols.normal) + '</span>).');
    log('info', 'win() is at <span class="log-addr">' + hex8(state.symbols.win) + '</span>. Overflow from A into B to overwrite it!');
    const aAddr = state.heapNames['A'];
    const bAddr = state.heapNames['B'];
    if (aAddr !== undefined && bAddr !== undefined) {
      const aDataStart = aAddr + state.heap.HEADER_SIZE;
      const bDataStart = bAddr + state.heap.HEADER_SIZE;
      const distance = bDataStart - aDataStart;
      log('info', 'A\'s data starts at offset ' + aDataStart + ', B\'s data starts at offset ' + distance + ' bytes later. You need ' + distance + ' bytes of padding, then the win() address in little-endian.');
    }
  }

  if (ex.mode === 'heap-tcache-poison') {
    log('info', 'Chunks A and B are allocated (both 16 bytes). We will free B, then use a UAF to corrupt its forward pointer.');
    log('info', 'The function pointer table (handler) is at <span class="log-addr">' + hex8(ex.funcPtrAddr) + '</span>');
    log('info', 'win() is at <span class="log-addr">' + hex8(state.symbols.win) + '</span>');
    log('info', 'Click Step to walk through the tcache poisoning attack.');
  }

  if (ex.mode === 'heap-fastbin-dup') {
    log('info', 'Tcache has been pre-filled (7 entries for size 24). New frees of that size go to the <strong>fastbin</strong> instead.');
    log('info', 'Chunks A and B are allocated. We will do the A-B-A free trick to create a cycle in the fastbin.');
    log('info', 'The function pointer table (handler) is at <span class="log-addr">' + hex8(ex.funcPtrAddr) + '</span>');
    log('info', 'win() is at <span class="log-addr">' + hex8(state.symbols.win) + '</span>');
    log('info', 'Click Step to walk through the fastbin dup attack.');
  }

  if (ex.mode === 'heap-unsorted-bin') {
    log('info', 'Chunk A (128 bytes) and a guard chunk are allocated. We will free A into the unsorted bin.');
    log('info', 'The unsorted bin is a doubly-linked list. Each chunk has fd (forward) and bk (backward) pointers.');
    log('info', 'The function pointer table (handler) is at <span class="log-addr">' + hex8(ex.funcPtrAddr) + '</span>');
    log('info', 'main_arena is at <span class="log-addr">' + hex8(state.heap.mainArena) + '</span> — this value gets written during unlink.');
    log('info', 'Click Step to walk through the unsorted bin attack.');
  }

  if (ex.mode === 'heap-house-force') {
    log('info', 'Chunk A (16 bytes) is allocated right before the top chunk (wilderness).');
    const topDataAddr = state.heap.topAddr;
    const topDisplayAddr = state.heap.baseAddr + topDataAddr;
    log('info', 'Top chunk starts at <span class="log-addr">' + hex8(topDisplayAddr) + '</span> with size ' + state.heap.topSize + '.');
    log('info', 'The function pointer table (handler) is at <span class="log-addr">' + hex8(ex.funcPtrAddr) + '</span>');
    log('info', 'win() is at <span class="log-addr">' + hex8(state.symbols.win) + '</span>');
    log('info', 'Click Step to walk through the House of Force attack.');
  }

  if (ex.mode === 'heap-house-spirit') {
    const stackDisplayAddr = state.heap.baseAddr + state.spiritStackAddr;
    log('info', 'We have a stack buffer at <span class="log-addr">' + hex8(stackDisplayAddr) + '</span> (64 bytes).');
    log('info', 'The idea: write fake chunk headers into this buffer, then free() the fake chunk. The allocator trusts the metadata!');
    log('info', 'A valid chunk needs: prev_size (4 bytes) + size with PREV_INUSE flag (4 bytes) + data. Also needs a valid next-chunk header after it.');
    log('info', 'The function pointer table (handler) is at <span class="log-addr">' + hex8(ex.funcPtrAddr) + '</span>');
    log('info', 'win() is at <span class="log-addr">' + hex8(state.symbols.win) + '</span>');
    log('info', 'Click Step to walk through the House of Spirit attack.');
  }

  if (ex.mode === 'heap-house-orange') {
    log('info', 'Chunk A (16 bytes) is allocated right before the top chunk.');
    log('info', 'IMPORTANT: There is NO free() call in this program! We must create our own free.');
    const topDataAddr = state.heap.topAddr;
    const topDisplayAddr = state.heap.baseAddr + topDataAddr;
    log('info', 'Top chunk starts at <span class="log-addr">' + hex8(topDisplayAddr) + '</span> with size ' + state.heap.topSize + '.');
    log('info', 'The function pointer table (handler) is at <span class="log-addr">' + hex8(ex.funcPtrAddr) + '</span>');
    log('info', 'main_arena is at <span class="log-addr">' + hex8(state.heap.mainArena) + '</span>');
    log('info', 'Click Step to walk through the House of Orange attack.');
  }

  if (ex.mode === 'heap-house-einherjar') {
    log('info', 'Four chunks allocated: A, B, C, and Guard (all 16 bytes each, 24 bytes with headers).');
    const aAddr = state.heapNames['A'];
    const bAddr = state.heapNames['B'];
    const cAddr = state.heapNames['C'];
    if (aAddr !== undefined && bAddr !== undefined && cAddr !== undefined) {
      log('info', 'A at offset ' + aAddr + ', B at offset ' + bAddr + ', C at offset ' + cAddr);
    }
    log('info', 'An off-by-one null byte from A will clear B\'s PREV_INUSE flag. When C is freed, backward consolidation will create a huge overlapping chunk.');
    log('info', 'The function pointer table (handler) is at <span class="log-addr">' + hex8(ex.funcPtrAddr) + '</span>');
    log('info', 'win() is at <span class="log-addr">' + hex8(state.symbols.win) + '</span>');
    log('info', 'Click Step to walk through the House of Einherjar attack.');
  }

  if (ex.mode === 'heap-house-lore') {
    log('info', 'Chunk A (80 bytes) and a guard chunk are allocated.');
    log('info', 'We will free A into the unsorted bin, then trigger a sort into the smallbin.');
    log('info', 'The smallbin is a doubly-linked list with a consistency check: victim->bk->fd must equal victim.');
    log('info', 'To bypass this, we set up a fake chunk whose fd points back to the real chunk.');
    log('info', 'The function pointer table (handler) is at <span class="log-addr">' + hex8(ex.funcPtrAddr) + '</span>');
    log('info', 'win() is at <span class="log-addr">' + hex8(state.symbols.win) + '</span>');
    log('info', 'Click Step to walk through the House of Lore attack.');
  }

  if (ex.mode === 'final-chain') {
    log('info', 'This program has FOUR bugs. You must chain them all together to redirect execution.');
    log('info', 'win() is at <span class="log-addr">' + hex8(state.symbols.win) + '</span>');
    log('info', '<strong>Phase 1:</strong> count is an unsigned 16-bit integer. count * 4 uses 16-bit arithmetic. Find a count that makes count*4 wrap to something tiny.');
    log('info', 'Hint: 16385 * 4 = 65540. But 65540 mod 65536 = 4. So malloc gets only 4 bytes!');
  }

  if (ex.mode === 'final-blind') {
    log('info', '...');
  }

  if (ex.mode !== 'step' && !ex.mode.startsWith('heap-') && !ex.mode.startsWith('final-')) {
    log('info', 'Go-back address: ' + hex8(retAddr) + ' (where the program normally returns to after vuln finishes)');
  }

  renderNav();
  renderSource(ex);
  renderViz();
  renderInput(ex);
  renderLog();
}

  const retAddr = retAddrInMain();

  }
  if (aslr) {
    log('warn', 'DEBUG: win() is at <span class="log-addr">' + hex8(state.symbols.win) + '</span>');

    bytes = hexStrToBytes(raw);
