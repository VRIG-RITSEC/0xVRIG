function onIntOverflowInput() {
  const input = document.getElementById('int-input');
  const result = document.getElementById('int-result');
  const indicator = document.getElementById('int-overflow-indicator');
  const payloadDiv = document.getElementById('int-overflow-payload');
  if (!input || !result) return;

  const val = parseInt(input.value);
  if (isNaN(val) || val < 0) {
    result.textContent = '—';
    indicator.innerHTML = '';
    if (payloadDiv) payloadDiv.style.display = 'none';
    return;
  }

  const ex = EXERCISES[state.currentEx];
  const headerSize = (ex && ex.headerSize) || 64;
  const total = (val + headerSize) >>> 0;
  const wrapped = val > 0 && total < val;

  result.textContent = '0x' + total.toString(16).toUpperCase().padStart(8, '0');
  result.style.color = wrapped ? 'var(--red)' : 'var(--green)';

  if (wrapped) {
    const bufSize = Math.max(total, 4);  // minimum 4 bytes to be usable
    indicator.innerHTML = '<span style="color:var(--red)">⚠ WRAP! ' + val + ' + ' + headerSize +
      ' overflows past 0xFFFFFFFF → buffer is only ' + bufSize + ' bytes!</span>';
    if (payloadDiv) payloadDiv.style.display = 'block';
    const retAddr = retAddrInMain();
    state.sim = new StackSim(bufSize, retAddr, 0xbfff0200);
    state.sim.intOverflowLen = val;
    state.execSteps = null;
    state.execIndex = 0;
    state.inputMode = 'hex';
    renderViz();
  } else {
    indicator.innerHTML = '<span style="color:var(--text-dim)">No overflow — buffer is ' + total + ' bytes.</span>';
    if (payloadDiv) payloadDiv.style.display = 'none';
  }
}

// ──────────────────────────────────────────────
// Unified step-through execution engine
// ──────────────────────────────────────────────
function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

function highlightExecLine(lineIdx) {
  document.querySelectorAll('.src-line.executing').forEach(el => el.classList.remove('executing'));
  if (lineIdx >= 0) {
    const lines = document.querySelectorAll('.src-line');
    if (lines[lineIdx]) {
      lines[lineIdx].classList.add('executing');
      lines[lineIdx].scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }
  }
}

function findCodeLine(ex, pattern) {
  return ex.code.findIndex(l => l.text.includes(pattern));
}

function findVulnClose(ex) {
  const fnLine = ex.code.find(l => l.fn);
  const fnName = fnLine ? (fnLine.text.match(/void\s+(\w+)/)||[])[1] || 'vuln' : 'vuln';
  const start = findCodeLine(ex, 'void ' + fnName);
  if (start < 0) return -1;
  for (let i = start + 1; i < ex.code.length; i++) {
    if (ex.code[i].text.trim() === '}') return i;
  }
  return -1;
}

function updateStepCounter() {
  const el = document.getElementById('step-counter');
  if (!el) return;
  if (!state.execSteps) { el.textContent = ''; return; }
  const s = state.execSteps[state.execIndex];
  const label = s ? s.label : 'done';
  el.innerHTML = '<span style="color:var(--yellow)">Step ' + (state.execIndex + 1) + '/' + state.execSteps.length + '</span> — ' + label;
}

function generateExecSteps(ex, bytes) {
  const sim = state.sim;
  const steps = [];
  const WORD = 4;

  // Integer overflow preamble steps
  if (ex.intOverflow) {
    const userLen = sim.intOverflowLen || bytes.length;
    const headerSize = ex.headerSize || 64;
    const total = (userLen + headerSize) >>> 0;

    steps.push({
      label: 'scanf — read user length',
      srcLine: findCodeLine(ex, 'scanf'),
      logs: [['action', 'scanf("%u", &len) → user entered: ' + userLen]],
      action() {}
    });
    steps.push({
      label: 'compute total = len + ' + headerSize,
      srcLine: findCodeLine(ex, 'total = user_len'),
      logs: [
        ['action', 'total = ' + userLen + ' + ' + headerSize + ' = ...'],
        ['error', '⚠ Integer overflow! Result wraps to ' + total + ' (0x' + total.toString(16).toUpperCase().padStart(8, '0') + ')'],
      ],
      action() {}
    });
  }

  // Signedness bug preamble steps
  if (ex.signedness) {
    const signedLen = sim.signedLen || -1;
    steps.push({
      label: 'scanf — read length',
      srcLine: findCodeLine(ex, 'scanf'),
      logs: [['action', 'scanf("%d", &len) → user entered: ' + signedLen]],
      action() {}
    });
    steps.push({
      label: 'bounds check: len > 64?',
      srcLine: findCodeLine(ex, 'if (len'),
      logs: [
        ['action', 'if (' + signedLen + ' > 64) → NO, check passes!'],
        ['warn', 'Negative numbers are always < 64 in signed comparison!'],
      ],
      action() {}
    });
    steps.push({
      label: 'cast to unsigned for memcpy',
      srcLine: findCodeLine(ex, 'memcpy'),
      logs: [
        ['action', '(size_t)' + signedLen + ' → ' + (signedLen >>> 0)],
        ['error', 'memcpy will copy a HUGE number of bytes!'],
      ],
      action() {}
    });
  }

  // Detect function name for this exercise
  const fnLine = ex.code.find(l => l.fn);
  const fnName = fnLine ? (fnLine.text.match(/void\s+(\w+)/)||[])[1] || 'vuln' : 'vuln';
  const callPattern = fnName === 'vuln' ? '    vuln();' : '    ' + fnName + '(';

  // 1. CALL function
  steps.push({
    label: 'CALL ' + fnName,
    srcLine: findCodeLine(ex, callPattern),
    logs: [['action', '▶ Calling ' + fnName + '() — saving go-back address <span class="log-addr">' + hex8(sim.origRetAddr) + '</span>']],
    action(sim) {
      sim.clearBlank();
      sim._writeLE(sim.bufSize + sim.canarySize + 4, sim.origRetAddr, 4);
      sim.markRegion(sim.bufSize + sim.canarySize + 4, sim.totalSize);
    }
  });

  // 2. push EBP
  steps.push({
    label: 'save bookmark (push EBP)',
    srcLine: findCodeLine(ex, 'void ' + fnName),
    logs: [['action', 'Save bookmark to previous frame <span class="log-addr">' + hex8(sim.origSavedEbp) + '</span> (so the program can clean up later)']],
    action(sim) {
      sim._writeLE(sim.bufSize + sim.canarySize, sim.origSavedEbp, 4);
      sim.markRegion(sim.bufSize + sim.canarySize, sim.bufSize + sim.canarySize + 4);
    }
  });

  // 3. sub ESP (allocate buffer + canary)
  const allocLabel = sim.useCanary ? 'Make room for buf[' + sim.bufSize + '] + canary[4] (' + (sim.bufSize + sim.canarySize) + ' bytes)' : 'Make room for buf[' + sim.bufSize + '] (' + sim.bufSize + ' bytes on the stack)';
  steps.push({
    label: allocLabel,
    srcLine: findCodeLine(ex, 'char buf'),
    logs: [['action', allocLabel]],
    action(sim) {
      for (let i = 0; i < sim.bufSize; i++) sim.memory[i] = 0;
      if (sim.useCanary) sim._writeLE(sim.bufSize, sim.canaryValue, 4);
      sim.markRegion(0, sim.bufSize + sim.canarySize);
    }
  });

  // 4. Info leak lines (printf)
  const printfLine = findCodeLine(ex, 'printf(');
  const leakLine = ex.code.findIndex(l => l.text.includes('printf') && (l.text.includes('DEBUG') || l.text.includes('printf(buf)')));
  if (leakLine >= 0) {
    steps.push({
      label: 'printf — accidental leak!',
      srcLine: leakLine,
      logs: ex.aslr
        ? [['warn', 'printf output: DEBUG: main() is at <span class="log-addr">' + hex8(state.symbols.main) + '</span> <span class="log-label">← the program leaked an address!</span>']]
        : ex.canary
          ? [['warn', 'Bug in printf(buf) leaks the secret tripwire: canary = <span class="log-addr">' + hex8(sim.canaryValue) + '</span> <span class="log-label">← now we know it!</span>']]
          : [['info', 'printf output']],
      action() {}
    });
  }

  // 5. gets(buf) — write word by word
  let getsLine = findCodeLine(ex, 'gets');
  if (getsLine < 0) getsLine = findCodeLine(ex, 'read_input');
  if (getsLine < 0) getsLine = findCodeLine(ex, 'read_byte');
  if (getsLine < 0) getsLine = findCodeLine(ex, 'memcpy');
  const maxWrite = ex.offByOne ? Math.min(bytes.length, sim.bufSize + 1) : Math.min(bytes.length, sim.totalSize);
  const totalBytes = maxWrite;

  for (let off = 0; off < totalBytes; off += WORD) {
    const chunk = bytes.slice(off, Math.min(off + WORD, totalBytes));
    const region = sim.regionOf(off);
    const isOverflow = off >= sim.bufSize;
    let label = ex.offByOne ? 'read_byte(): write ' : ex.signedness ? 'memcpy(): write ' : 'gets(): write ';
    if (ex.offByOne && off === sim.bufSize) {
      label += 'OFF-BY-ONE → saved bookmark (low byte)';
    } else if (region === 'buffer') label += 'buf[' + off + '..' + (off + chunk.length - 1) + ']';
    else if (region === 'canary') label += 'OVERFLOW → canary (tripwire!)';
    else if (region === 'ebp') label += 'OVERFLOW → saved bookmark';
    else if (region === 'ret') label += 'OVERFLOW → go-back address!';

    const hexChunk = chunk.map(b => hex2(b)).join(' ');
    const asciiChunk = chunk.map(b => toAscii(b)).join('');

    const logs = [['action', label + '  [' + hexChunk + '] "' + asciiChunk + '"']];
    if (off === sim.bufSize) {
      logs.unshift(['warn', '⚠ OVERFLOW — input is spilling past the buffer! Everything above it is getting overwritten!']);
    }

    const capturedOff = off;
    const capturedChunk = chunk;
    steps.push({
      label: label,
      srcLine: getsLine,
      logs: logs,
      action(sim) { sim.writeWord(capturedOff, capturedChunk); }
    });
  }

  // 6. gets returns
  steps.push({
    label: 'gets() returns',
    srcLine: getsLine,
    logs: [['action', 'gets() finished reading your input — ' + totalBytes + ' bytes placed on the stack.']],
    action(sim) { sim.clearHighlight(); }
  });

  // 7. Canary check (if applicable)
  if (sim.useCanary) {
    steps.push({
      label: 'Check the tripwire (canary)',
      srcLine: findVulnClose(ex),
      logs: [],
      action(sim) {
        sim.markRegion(sim.bufSize, sim.bufSize + sim.canarySize);
      },
      canaryCheck: true
    });
  }

  // 8. LEAVE
  steps.push({
    label: 'Clean up — function is ending',
    srcLine: findVulnClose(ex),
    logs: [['action', 'Function is done — cleaning up the stack frame']],
    action(sim) { sim.markRegion(sim.bufSize + sim.canarySize, sim.bufSize + sim.canarySize + 4); }
  });

  // 9. RET — pop EIP
  steps.push({
    label: 'Return — jump to go-back address',
    srcLine: findVulnClose(ex),
    logs: [],
    action(sim) { sim.markRegion(sim.bufSize + sim.canarySize + 4, sim.totalSize); },
    retCheck: true
  });

  // 10. Jump destination
  if (!ex.offByOne && !ex.ret2libc && !ex.rop && !ex.srop) {
    steps.push({
      label: 'Jump! Where does the program go?',
      srcLine: -1,
      logs: [],
      action() {},
      jumpCheck: true
    });
  }

  // ret2libc check
  if (ex.ret2libc) {
    steps.push({
      label: 'ret2libc — calling system()?',
      srcLine: -1,
      logs: [],
      action() {},
      ret2libcCheck: true
    });
  }

  // ROP chain execution
  if (ex.rop) {
    steps.push({
      label: 'ROP chain — executing gadgets',
      srcLine: -1,
      logs: [],
      action() {},
      ropChainExec: true
    });
  }

  // SROP execution
  if (ex.srop) {
    steps.push({
      label: 'SROP — sigreturn restores registers',
      srcLine: -1,
      logs: [],
      action() {},
      sropExec: true
    });
  }

  // Off-by-one: after vuln's normal return, main's frame is corrupted
  if (ex.offByOne) {
    steps.push({
      label: 'vuln() returns normally',
      srcLine: -1,
      logs: [
        ['action', 'vuln() returned to main() — the return address wasn\'t touched, so that was normal.'],
      ],
      action() {}
    });
    steps.push({
      label: 'Back in main() — EBP is corrupted',
      srcLine: findCodeLine(ex, 'return 0') >= 0 ? findCodeLine(ex, 'return 0') : -1,
      logs: [
        ['action', 'Returned to main() — that looked normal...'],
        ['warn', 'But EBP is now corrupted! The low byte was overwritten by your 17th byte.'],
      ],
      action() {}
    });
    steps.push({
      label: 'main() returns — reads go-back addr from WRONG place',
      srcLine: -1,
      logs: [],
      action() {},
      oboRetCheck: true
    });
  }

  return steps;
}

function execCurrentStep() {
  if (!state.execSteps || state.execIndex >= state.execSteps.length) return false;
  const step = state.execSteps[state.execIndex];
  const sim = state.sim;
  const ex = typeof state.currentEx === 'number' ? EXERCISES[state.currentEx] : null;

  step.action(sim);
  if (step.srcLine >= 0) highlightExecLine(step.srcLine);
  else highlightExecLine(-1);
  step.logs.forEach(([cls, msg]) => log(cls, msg));

  // Special checks
  if (step.canaryCheck) {
    if (!sim.canaryIntact()) {
      log('error', '*** stack smashing detected! *** The tripwire was <span class="log-addr">' + hex8(sim.canaryValue) +
        '</span> but is now <span class="log-addr">' + hex8(sim.getCanary()) + '</span>');
      log('error', 'Program aborted! You need to put the correct canary value at position ' + sim.bufSize + ' in your payload so the tripwire stays intact.');
      renderViz(); renderLog(); updateStepCounter();
      state.execSteps = null;
      highlightExecLine(-1);
      return false;
    } else {
      log('success', 'Tripwire (canary) intact ✓ — snuck past it!');
    }
  }

  if (step.retCheck) {
    const retAddr = sim.getRetAddr();
    log('action', 'Reading the go-back address: <span class="log-addr">' + hex8(retAddr) + '</span> — the program will jump here!');
  }

  if (step.oboRetCheck) {
    const lowByte = sim.memory[sim.bufSize];
    log('action', 'main() LEAVE — EBP low byte changed to 0x' + hex2(lowByte));

    const readOffset = Math.min(lowByte % sim.bufSize, sim.bufSize - 4);
    const fakeRet = sim._readLE(readOffset, 4);

    log('action', 'main() reads go-back address from shifted location (buf+' + readOffset + ') → <span class="log-addr">' + hex8(fakeRet) + '</span>');

    if (fakeRet === state.symbols.win) {
      log('success', '→ Jumped to win() via off-by-one redirect!');
      state.oboWin = true;
      if (ex && ex.winTitle) {
        showSuccess(ex.winTitle, ex.winMsg);
        state.completed.add(state.currentEx);
        saveProgress();
        renderNav();
      }
    } else if (fakeRet === 0 || fakeRet === sim.origRetAddr) {
      log('info', '→ Normal return — your 17th byte didn\'t shift the frame usefully. Try a different value.');
    } else {
      log('error', '→ CRASH! Jumped to ' + hex8(fakeRet) + ' — not a valid address. Adjust the value at buf offset ' + readOffset + '.');
    }
  }

  if (step.jumpCheck) {
    const retAddr = sim.getRetAddr();
    const nxEnabled = (ex && ex.nx) || (state.currentEx === 'sandbox' && document.getElementById('sb-nx')?.checked);
    const isStackAddr = retAddr >= 0xbfff0000 && retAddr < 0xc0000000;

    if (isStackAddr && nxEnabled) {
      log('error', '→ CRASH: tried to run code at <span class="log-addr">' + hex8(retAddr) + '</span> but the stack is marked "no running code here" (NX)');
      log('error', 'NX protection means the computer will store your data on the stack, but refuses to run it as code.');
      log('info', 'To bypass this, jump to a function that already exists in the program (like win) instead of trying to run your own code on the stack.');
    } else if (isStackAddr && !nxEnabled) {
      const off = retAddr - sim.baseAddr;
      if (off >= 0 && off < sim.totalSize) {
        const shellBytes = [];
        for (let i = off; i < Math.min(off + 8, sim.totalSize); i++) shellBytes.push(hex2(sim.memory[i]));
        log('success', '→ Jumped to the stack at <span class="log-addr">' + hex8(retAddr) + '</span> — running your bytes as code: ' + shellBytes.join(' '));
        log('success', 'NX is OFF — the computer is running your input as if it were a real program. This is called shellcode injection!');
        if (state.currentEx === 'sandbox') log('success', 'FLAG{shellcode_executed}');
      } else {
        log('success', '→ Jumped to the stack at <span class="log-addr">' + hex8(retAddr) + '</span> — running your input as code!');
        if (state.currentEx === 'sandbox') log('success', 'FLAG{shellcode_executed}');
      }
    } else {
      const sym = Object.entries(state.symbols).find(([, a]) => a === retAddr);
      if (sym && sym[0] === 'win') {
        const winLine = ex ? findCodeLine(ex, 'void win') : -1;
        if (winLine >= 0) highlightExecLine(winLine);
        log('success', '→ Jumped to win() — you control where the program goes!');
        if (nxEnabled) log('success', 'NX bypassed — you jumped to a real function in the program instead of code on the stack. Smart!');
        if (ex && ex.winTitle) {
          showSuccess(ex.winTitle, ex.winMsg);
          state.completed.add(state.currentEx);
          saveProgress();
          renderNav();
        } else if (state.currentEx === 'sandbox') {
          log('success', 'FLAG{sandbox_master}');
        }
      } else if (sym) {
        log('info', '→ Jumped to ' + sym[0] + '() at ' + hex8(retAddr));
      } else if (retAddr === sim.origRetAddr) {
        log('info', '→ Normal return to main() at ' + hex8(retAddr) + ' — nothing was overwritten');
      } else {
        log('error', '→ CRASH! The program tried to jump to ' + hex8(retAddr) + ' which doesn\'t exist — Segmentation Fault');
        if (ex && ex.check && ex.check(sim)) {
          showSuccess(ex.winTitle, ex.winMsg);
          state.completed.add(state.currentEx);
          saveProgress();
          renderNav();
        }
      }
    }
  }

  // ret2libc check
  if (step.ret2libcCheck) {
    const retAddr = sim.getRetAddr();
    const systemAddr = state.symbols.system;
    const binshAddr = state.symbols.binsh;

    log('action', 'Go-back address: <span class="log-addr">' + hex8(retAddr) + '</span>');

    if (retAddr === systemAddr) {
      log('success', '→ Jumping to system()!');
      // Read system's fake return addr and argument
      const fakeRetOffset = sim.bufSize + sim.canarySize + sim.ebpSize + sim.retSize;
      const argOffset = fakeRetOffset + 4;
      const fakeRet = sim._readLE(fakeRetOffset, 4);
      const arg = sim._readLE(argOffset, 4);
      log('action', 'system() reads its call frame from the stack:');
      log('action', '  Fake return address: <span class="log-addr">' + hex8(fakeRet) + '</span> (don\'t care)');
      log('action', '  Argument: <span class="log-addr">' + hex8(arg) + '</span>' +
        (arg === binshAddr ? ' → "/bin/sh"' : ' → not "/bin/sh"!'));

      if (arg === binshAddr) {
        log('success', '→ system("/bin/sh") — shell spawned!');
        if (ex && ex.winTitle) {
          showSuccess(ex.winTitle, ex.winMsg);
          state.completed.add(state.currentEx);
          saveProgress();
          renderNav();
        }
      } else {
        log('error', 'system() was called but the argument isn\'t "/bin/sh". Put the "/bin/sh" address (' + hex8(binshAddr) + ') 8 bytes after the go-back address: [system addr] [4 bytes anything] ["/bin/sh" addr]');
      }
    } else {
      const nxEnabled = true;
      const isStackAddr = retAddr >= 0xbfff0000 && retAddr < 0xc0000000;
      if (isStackAddr && nxEnabled) {
        log('error', '→ CRASH: tried to run code on the stack but NX is ON!');
        log('info', 'Instead of jumping to the stack, jump to system() at <span class="log-addr">' + hex8(systemAddr) + '</span>');
      } else if (retAddr === state.symbols.win) {
        log('success', '→ Jumped to win()! But try calling system("/bin/sh") for the ret2libc technique.');
      } else {
        log('error', '→ CRASH! Jumped to <span class="log-addr">' + hex8(retAddr) + '</span>. Set the go-back address to system() at <span class="log-addr">' + hex8(systemAddr) + '</span>');
      }
    }
  }

  // ROP chain execution
  if (step.ropChainExec) {
    const retAddr = sim.getRetAddr();
    const retOffset = sim.bufSize + sim.canarySize + sim.ebpSize;

    log('action', 'Starting ROP chain from go-back address: <span class="log-addr">' + hex8(retAddr) + '</span>');

    // Read chain from the payload starting at ret addr position
    let esp = retOffset + 4; // points past the initial ret addr (already "popped")
    let eip = retAddr;
    let chainOk = true;
    let maxSteps = 20;
    let stepCount = 0;

    // For pivot exercises, detect the pivot
    let pivoted = false;

    while (chainOk && stepCount < maxSteps) {
      stepCount++;
      // Look up current EIP in gadgets
      const gadgetStr = ex.gadgets ? ex.gadgets[eip] : null;

      if (!gadgetStr) {
        // Check if it's win()
        if (eip === state.symbols.win) {
          log('success', '→ EIP = <span class="log-addr">' + hex8(eip) + '</span> = win()!');
          updateRegister('eip', eip);
          // Check if magic value was written
          if (ex.flagAddr && ex.magicValue) {
            const flagVal = state.ropFlagValue || 0;
            if (flagVal === ex.magicValue) {
              log('success', '→ flag_check == 0x' + ex.magicValue.toString(16) + ' — condition met!');
              state.ropWin = true;
              if (ex.winTitle) {
                showSuccess(ex.winTitle, ex.winMsg);
                state.completed.add(state.currentEx);
                saveProgress();
                renderNav();
              }
            } else {
              log('error', '→ flag_check is ' + hex8(flagVal) + ', not ' + hex8(ex.magicValue) + '. The ROP chain needs to write the magic value before jumping to win().');
            }
          }
          break;
        } else {
          log('error', '→ EIP = <span class="log-addr">' + hex8(eip) + '</span> — unknown address! Chain broken.');
          const isStackAddr = eip >= 0xbfff0000 && eip < 0xc0000000;
          if (isStackAddr) {
            log('error', 'Tried to execute on the stack — NX blocks this! Use gadget addresses instead.');
          }
          chainOk = false;
          break;
        }
      }

      log('action', 'Execute gadget at <span class="log-addr">' + hex8(eip) + '</span>: <strong>' + gadgetStr + '</strong>');
      updateRegister('eip', eip);
      updateRegister('esp', sim.baseAddr + esp);

      // Parse and simulate the gadget
      const parts = gadgetStr.split(';').map(s => s.trim()).filter(s => s && s !== 'ret');

      for (const instr of parts) {
        if (instr.startsWith('pop ')) {
          const reg = instr.split(' ')[1];
          if (esp + 4 <= sim.totalSize) {
            const val = sim._readLE(esp, 4);
            esp += 4;
            log('action', '  pop ' + reg + ' → <span class="log-addr">' + hex8(val) + '</span> (read from stack)');
            updateRegister(reg, val);
            if (reg === 'eax') state.ropEax = val;
            if (reg === 'ebx') state.ropEbx = val;
          } else {
            log('error', '  pop ' + reg + ' — ran out of stack data!');
            chainOk = false;
          }
        } else if (instr === 'mov [ebx], eax') {
          const ebxVal = state.ropEbx || 0;
          const eaxVal = state.ropEax || 0;
          log('action', '  mov [ebx], eax → writing <span class="log-addr">' + hex8(eaxVal) + '</span> to address <span class="log-addr">' + hex8(ebxVal) + '</span>');
          if (ex.flagAddr && ebxVal === ex.flagAddr) {
            state.ropFlagValue = eaxVal;
            log('success', '  Wrote to flag_check!');
          }
        } else if (instr === 'xchg eax, esp') {
          const oldEax = state.ropEax || 0;
          log('action', '  xchg eax, esp → ESP is now <span class="log-addr">' + hex8(oldEax) + '</span> (pivoting stack!)');
          // Convert the address to an offset into sim memory
          const newEsp = oldEax - sim.baseAddr;
          if (newEsp >= 0 && newEsp < sim.totalSize) {
            esp = newEsp;
            pivoted = true;
            log('success', '  Stack pivoted to buffer! ESP now points into our controlled data.');
            updateRegister('esp', oldEax);
          } else {
            log('error', '  Bad pivot address! ESP points outside our memory.');
            chainOk = false;
          }
        }
      }

      // ret: pop next EIP from stack
      if (chainOk && esp + 4 <= sim.totalSize) {
        eip = sim._readLE(esp, 4);
        esp += 4;
        log('action', '  ret → pop EIP = <span class="log-addr">' + hex8(eip) + '</span>');
        updateRegister('esp', sim.baseAddr + esp);
      } else if (chainOk) {
        log('error', '  ret — ran out of stack data!');
        chainOk = false;
      }
    }

    if (stepCount >= maxSteps) {
      log('error', 'Chain too long — possible infinite loop. Check your payload.');
    }
  }

  // SROP execution
  if (step.sropExec) {
    const retAddr = sim.getRetAddr();
    const sigreturnAddr = state.symbols.sigreturn || 0x080481b0;

    log('action', 'Go-back address: <span class="log-addr">' + hex8(retAddr) + '</span>');

    if (retAddr === sigreturnAddr) {
      log('success', '→ Calling sigreturn()!');
      log('action', 'sigreturn reads the signal frame from the stack and restores all registers...');

      // Read the signal frame from the stack (starts right after the ret addr)
      const frameStart = sim.bufSize + sim.canarySize + sim.ebpSize + sim.retSize;
      // Frame layout: EAX(4) EBX(4) ECX(4) EDX(4) ESP(4) EIP(4) = 24 bytes
      if (frameStart + 24 <= sim.totalSize) {
        const eax = sim._readLE(frameStart + 0, 4);
        const ebx = sim._readLE(frameStart + 4, 4);
        const ecx = sim._readLE(frameStart + 8, 4);
        const edx = sim._readLE(frameStart + 12, 4);
        const esp = sim._readLE(frameStart + 16, 4);
        const eip = sim._readLE(frameStart + 20, 4);

        updateRegister('eax', eax);
        updateRegister('ebx', ebx);
        updateRegister('ecx', ecx);
        updateRegister('edx', edx);
        updateRegister('esp', esp);
        updateRegister('eip', eip);

        log('action', '  EAX = <span class="log-addr">' + hex8(eax) + '</span>');
        log('action', '  EBX = <span class="log-addr">' + hex8(ebx) + '</span>');
        log('action', '  ECX = <span class="log-addr">' + hex8(ecx) + '</span>');
        log('action', '  EDX = <span class="log-addr">' + hex8(edx) + '</span>');
        log('action', '  ESP = <span class="log-addr">' + hex8(esp) + '</span>');
        log('action', '  EIP = <span class="log-addr">' + hex8(eip) + '</span>');

        if (eip === state.symbols.win) {
          log('success', '→ EIP points to win() — all registers set in one shot!');
          state.sropWin = true;
          if (ex && ex.winTitle) {
            showSuccess(ex.winTitle, ex.winMsg);
            state.completed.add(state.currentEx);
            saveProgress();
            renderNav();
          }
        } else {
          log('error', '→ EIP = ' + hex8(eip) + ' — that\'s not win() (' + hex8(state.symbols.win) + '). Set EIP in the signal frame to win\'s address.');
        }
      } else {
        log('error', 'Signal frame doesn\'t fit on the stack! Your payload needs to be longer: padding + junk EBP + sigreturn addr + 24 bytes of frame.');
      }
    } else {
      log('error', '→ Go-back address is <span class="log-addr">' + hex8(retAddr) + '</span> — should be sigreturn at <span class="log-addr">' + hex8(sigreturnAddr) + '</span>');
    }
  }

  renderViz();
  renderLog();
  if (ex && (ex.rop || ex.srop)) renderRegisters();
  state.execIndex++;
  updateStepCounter();
  return state.execIndex < state.execSteps.length;
}

function doStep() {
  const ex = typeof state.currentEx === 'number' ? EXERCISES[state.currentEx] : null;

  // Heap step-through exercises (Exercise 15)
  if (ex && ex.mode === 'step' && ex.vizMode === 'heap') {
    if (!ex.steps || state.stepIndex >= ex.steps.length) {
      log('info', 'All steps complete.');
      renderLog();
      return;
    }
    const step = ex.steps[state.stepIndex];
    executeHeapStep(step);
    state.stepIndex++;
    renderViz(); renderLog();
    return;
  }

  // Exercise 1 uses its own predefined step system
  if (ex && ex.mode === 'step') {
    if (!ex.steps || state.stepIndex >= ex.steps.length) {
      log('info', 'All steps complete.');
      renderLog();
      state.completed.add(state.currentEx);
      saveProgress();
      renderNav();
      return;
    }
    const step = ex.steps[state.stepIndex];
    const sim = state.sim;
    if (step.region === 'ret') {
      const ret = retAddrInMain();
      sim._writeLE(sim.bufSize + sim.canarySize + 4, ret, 4);
      sim.markRegion(sim.bufSize + sim.canarySize + 4, sim.totalSize);
      highlightExecLine(findCodeLine(ex, '    vuln();'));
      log('action', 'Calling vuln() — saving the go-back address <span class="log-addr">' + hex8(ret) + '</span> so we know where to return');
    } else if (step.region === 'ebp') {
      sim._writeLE(sim.bufSize + sim.canarySize, 0xbfff0200, 4);
      sim.markRegion(sim.bufSize + sim.canarySize, sim.bufSize + sim.canarySize + 4);
      highlightExecLine(findCodeLine(ex, 'void vuln'));
      log('action', step.log[1]);
    } else if (step.region === 'buffer') {
      for (let i = 0; i < sim.bufSize; i++) sim.memory[i] = 0;
      sim.markRegion(0, sim.bufSize);
      highlightExecLine(findCodeLine(ex, 'char buf'));
      log('action', step.log[1]);
    } else if (step.region === 'all') {
      highlightExecLine(-1);
      sim.clearHighlight();
      log(step.log[0], step.log[1]);
    } else {
      log(step.log[0], step.log[1]);
    }
    state.stepIndex++;
    renderViz(); renderLog();
    if (state.stepIndex >= ex.steps.length) {
      state.completed.add(state.currentEx);
      saveProgress();
      renderNav();
    }
    return;
  }

  // Exercises 2-6 + sandbox: generate steps on first click
  if (!state.execSteps) {
    const textarea = document.getElementById('payload-input');
    if (!textarea || !textarea.value.trim()) { log('info', 'Enter a payload first.'); renderLog(); return; }
    const raw = textarea.value;
    const bytes = state.inputMode === 'hex' ? hexStrToBytes(raw) : strToBytes(raw);
    if (!bytes.length) { log('info', 'Empty payload.'); renderLog(); return; }

    state.sim.resetForInput();
    state.sim.clearBlank();
    const exOrSandbox = ex || {code: state.sandboxCode || [], aslr: document.getElementById('sb-aslr')?.checked, canary: document.getElementById('sb-canary')?.checked, nx: document.getElementById('sb-nx')?.checked};
    state.execSteps = generateExecSteps(exOrSandbox, bytes);
    state.execIndex = 0;
    renderViz();
    updateStepCounter();
  }

  if (state.execIndex >= state.execSteps.length) {
    log('info', 'Execution complete. Reset to try again.');
    renderLog();
    return;
  }

  execCurrentStep();
}

async function doRunAll() {
  if (state.running) return;

  // Generate steps if not yet started
  if (!state.execSteps) {
    doStep(); // this generates steps and runs the first one
    if (!state.execSteps) return; // no payload
  }

  state.running = true;
  while (state.execIndex < state.execSteps.length) {
    const step = state.execSteps[state.execIndex];
    const isOverflow = step.label.includes('OVERFLOW');
    const isCheck = step.canaryCheck || step.retCheck || step.jumpCheck;

    execCurrentStep();
    await delay(isCheck ? 600 : isOverflow ? 300 : 150);

    if (!state.running) break; // reset was called
  }
  state.running = false;
}

function simulateFmtRead(input) {
  const ex = EXERCISES[state.currentEx];
  if (!ex || !ex.fmtRead) return;

  state.logMessages = [];
  log('info', '═══ ' + ex.title + ' ═══');
  log('action', 'printf(buf) — interpreting your input as a format string...');
  log('info', '');

  // Simulated stack values above buf (what printf would read as "arguments")
  const stackValues = [
    { label: 'printf internal', value: 0xbfff0200 },
    { label: 'buf pointer', value: state.sim.baseAddr },
    { label: 'saved register', value: 0x00000040 },
    { label: '★ secret', value: ex.secretValue },
    { label: 'saved EBP', value: 0xbfff0300 },
    { label: 'return address', value: retAddrInMain() },
  ];

  let output = '';
  let stackIdx = 0;
  let i = 0;
  state.fmtLeakedSecret = false;

  while (i < input.length) {
    if (input[i] === '%' && i + 1 < input.length) {
      const spec = input[i + 1];
      if ((spec === 'x' || spec === 'p') && stackIdx < stackValues.length) {
        const sv = stackValues[stackIdx];
        const hexVal = (sv.value >>> 0).toString(16).padStart(8, '0');
        const prefix = spec === 'p' ? '0x' : '';
        output += prefix + hexVal;
        log('action', '%' + spec + ' → read stack slot ' + (stackIdx + 1) + ': <span class="log-addr">0x' +
          hexVal + '</span> <span class="log-label">(' + sv.label + ')</span>');

        if (sv.value === ex.secretValue) {
          log('success', '★ That\'s the secret! You found it: 0x' + hexVal.toUpperCase());
          state.fmtLeakedSecret = true;
        }
        stackIdx++;
        i += 2;
        continue;
      } else if (spec === 's') {
        output += '(string)';
        log('warn', '%s → tried to read a string from the stack — could crash the program!');
        stackIdx++;
        i += 2;
        continue;
      } else if (spec === 'n') {
        log('error', '%n → this WRITES to memory! Dangerous, but we\'ll learn about it next.');
        stackIdx++;
        i += 2;
        continue;
      }
    }
    output += input[i];
    i++;
  }

  log('info', '');
  log('action', 'printf output: "' + output + '"');

  if (state.fmtLeakedSecret) {
    log('info', '');
    log('success', 'The secret was at stack slot ' + (ex.secretOffset + 1) +
      '. Tip: in real exploits you can use %' + (ex.secretOffset + 1) + '$x to read a specific slot directly.');
    showSuccess(ex.winTitle, ex.winMsg);
    state.completed.add(state.currentEx);
    saveProgress();
    renderNav();
  } else if (stackIdx > 0) {
    log('info', '');
    log('info', 'Keep adding more %x to walk further up the stack. The secret (0xCAFEBABE) is hiding in one of the slots!');
  }

  renderLog();
}

function simulateFmtWrite(input) {
  const ex = EXERCISES[state.currentEx];
  if (!ex || !ex.fmtWrite) return;

  state.logMessages = [];
  state.fmtWriteSuccess = false;
  log('info', '═══ ' + ex.title + ' ═══');
  log('info', 'authorized is at <span class="log-addr">' + hex8(ex.targetAddr) + '</span> — currently 0');
  log('action', 'printf(buf) — your input is the format string...');
  log('info', '');

  const bufBytes = [];
  for (let j = 0; j < Math.min(4, input.length); j++) bufBytes.push(input.charCodeAt(j) & 0xff);
  const addrFromBuf = bufBytes.length >= 4 ? (bufBytes[0] | (bufBytes[1] << 8) | (bufBytes[2] << 16) | (bufBytes[3] << 24)) >>> 0 : 0;

  const stackSlots = [
    { label: 'printf internal', value: 0xbfff0200 },
    { label: 'buf pointer', value: state.sim.baseAddr },
    { label: 'saved register', value: 0x00000040 },
    { label: 'buf[0..3] — YOUR address bytes', value: addrFromBuf },
  ];

  let printedChars = 4;
  let stackIdx = 0;
  let i = 4;

  if (bufBytes.length >= 4) {
    log('info', 'First 4 bytes → address: <span class="log-addr">' + hex8(addrFromBuf) + '</span>' +
      (addrFromBuf === ex.targetAddr ? ' <span style="color:var(--green)">✓ matches authorized!</span>' : ''));
  }

  while (i < input.length) {
    const directMatch = input.slice(i).match(/^%(\d+)\$([xpn])/);
    if (directMatch) {
      const slotNum = parseInt(directMatch[1]);
      const action = directMatch[2];
      if ((action === 'x' || action === 'p') && slotNum <= stackSlots.length) {
        const sv = stackSlots[slotNum - 1];
        const hexVal = (sv.value >>> 0).toString(16).padStart(8, '0');
        printedChars += hexVal.length;
        log('action', '%' + slotNum + '$' + action + ' → read slot ' + slotNum + ': <span class="log-addr">0x' + hexVal + '</span> <span class="log-label">(' + sv.label + ')</span>');
      } else if (action === 'n' && slotNum <= stackSlots.length) {
        const sv = stackSlots[slotNum - 1];
        log('action', '%' + slotNum + '$n → WRITE value ' + printedChars + ' to address at slot ' + slotNum + ': <span class="log-addr">' + hex8(sv.value) + '</span>');
        if (sv.value === ex.targetAddr) {
          log('success', 'Wrote ' + printedChars + ' to authorized! It\'s now non-zero → win() is called!');
          state.fmtWriteSuccess = true;
        } else {
          log('warn', 'Wrote to ' + hex8(sv.value) + ' — that\'s not authorized (' + hex8(ex.targetAddr) + ')');
        }
      }
      i += directMatch[0].length;
      continue;
    }

    if (input[i] === '%' && i + 1 < input.length) {
      const spec = input[i + 1];
      if ((spec === 'x' || spec === 'p') && stackIdx < stackSlots.length) {
        const sv = stackSlots[stackIdx];
        const hexVal = (sv.value >>> 0).toString(16).padStart(8, '0');
        printedChars += hexVal.length;
        log('action', '%' + spec + ' → read slot ' + (stackIdx + 1) + ': <span class="log-addr">0x' + hexVal + '</span> <span class="log-label">(' + sv.label + ')</span>');
        stackIdx++;
        i += 2;
        continue;
      } else if (spec === 'n') {
        if (stackIdx < stackSlots.length) {
          const sv = stackSlots[stackIdx];
          log('action', '%n → WRITE value ' + printedChars + ' to address at slot ' + (stackIdx + 1) + ': <span class="log-addr">' + hex8(sv.value) + '</span>');
          if (sv.value === ex.targetAddr) {
            log('success', 'Wrote ' + printedChars + ' to authorized! It\'s now non-zero → win() is called!');
            state.fmtWriteSuccess = true;
          } else {
            log('warn', 'Wrote to ' + hex8(sv.value) + ' — not authorized. Use %x to advance to slot 4 first.');
          }
          stackIdx++;
        }
        i += 2;
        continue;
      }
    }
    printedChars++;
    i++;
  }

  log('info', '');
  if (state.fmtWriteSuccess) {
    showSuccess(ex.winTitle, ex.winMsg);
    state.completed.add(state.currentEx);
    saveProgress();
    renderNav();
  } else if (addrFromBuf !== ex.targetAddr) {
    log('info', 'Hint: start your input with the address of authorized (' + hex8(ex.targetAddr) + ') as \\x bytes in little-endian order.');
  } else {
    log('info', 'Address is correct! Use %x to advance past slots 1-3, then %n to write. Or try %4$n for direct access.');
  }
  renderLog();
}

function onSignednessInput() {
  const input = document.getElementById('sign-input');
  const check = document.getElementById('sign-check');
  const payloadDiv = document.getElementById('sign-payload');
  if (!input || !check) return;

  const val = parseInt(input.value);
  if (isNaN(val)) { check.innerHTML = ''; if (payloadDiv) payloadDiv.style.display = 'none'; return; }

  const unsigned = val >>> 0;
  const passesCheck = !(val > 64);
  let html = '';

  html += '<div>if (len > 64): ' + val + ' > 64? → <strong style="color:' + (passesCheck ? 'var(--green)' : 'var(--red)') + '">' + (passesCheck ? 'NO — check passes!' : 'YES — rejected!') + '</strong></div>';

  if (passesCheck && val < 0) {
    html += '<div style="color:var(--red);margin-top:0.25rem">Cast to unsigned: (size_t)' + val + ' → <strong>' + unsigned + '</strong> (0x' + unsigned.toString(16).toUpperCase() + ')</div>';
    html += '<div style="color:var(--red)">memcpy will try to copy ' + unsigned + ' bytes!</div>';
    if (payloadDiv) payloadDiv.style.display = 'block';
    state.sim.signedLen = val;
    state.execSteps = null;
    state.execIndex = 0;
  } else if (passesCheck && val >= 0) {
    html += '<div style="color:var(--text-dim)">Length ' + val + ' is fine — no overflow.</div>';
    if (payloadDiv) payloadDiv.style.display = 'none';
  } else {
    if (payloadDiv) payloadDiv.style.display = 'none';
  }

  check.innerHTML = html;
}

function appendGadgetAddr(addrHex) {
  const ta = document.getElementById('payload-input');
  if (!ta) return;
  const addrVal = parseInt(addrHex, 16);
  const le = [(addrVal) & 0xff, (addrVal >>> 8) & 0xff, (addrVal >>> 16) & 0xff, (addrVal >>> 24) & 0xff];
  const hexStr = le.map(b => hex2(b)).join(' ');
  if (ta.value && !ta.value.endsWith(' ')) ta.value += ' ';
  ta.value += hexStr;
  onPayloadInput();
}

function buildSigframe() {
  const fields = ['eip', 'esp', 'eax', 'ebx', 'ecx', 'edx'];
  const vals = {};
  for (const f of fields) {
    const el = document.getElementById('sf-' + f);
    const v = el ? parseInt(el.value.replace(/^0x/i, ''), 16) : 0;
    vals[f] = isNaN(v) ? 0 : v >>> 0;
  }

  // Build a simplified 32-bit signal frame (24 bytes for our 6 registers)
  // Real sigframes are bigger, but we simplify for teaching
  // Layout: EAX, EBX, ECX, EDX, ESP, EIP (each 4 bytes = 24 bytes total)
  const frameRegs = [vals.eax, vals.ebx, vals.ecx, vals.edx, vals.esp, vals.eip];
  const frameBytes = [];
  for (const v of frameRegs) {
    frameBytes.push(v & 0xff, (v >>> 8) & 0xff, (v >>> 16) & 0xff, (v >>> 24) & 0xff);
  }

  // Build full payload: padding + junk EBP + sigreturn addr + frame
  const sim = state.sim;
  const sigreturnAddr = state.symbols.sigreturn || 0x080481b0;
  const padding = [];
  for (let i = 0; i < sim.bufSize; i++) padding.push(0x41);
  const junkEbp = [0x42, 0x42, 0x42, 0x42];
  const sigretLE = [sigreturnAddr & 0xff, (sigreturnAddr >>> 8) & 0xff, (sigreturnAddr >>> 16) & 0xff, (sigreturnAddr >>> 24) & 0xff];

  const all = [...padding, ...junkEbp, ...sigretLE, ...frameBytes];
  const hexStr = all.map(b => hex2(b)).join(' ');

  const ta = document.getElementById('payload-input');
  if (ta) {
    ta.value = hexStr;
    state.inputMode = 'hex';
    onPayloadInput();
  }

  const preview = document.getElementById('sigframe-preview');
  if (preview) {
    preview.innerHTML = `<strong>Payload:</strong> ${sim.bufSize} padding + 4 junk EBP + sigreturn addr + signal frame (${frameBytes.length} bytes)<br>` +
      `EIP = ${hex8(vals.eip)} ${vals.eip === state.symbols.win ? '<span style="color:var(--green)">points to win()</span>' : '<span style="color:var(--red)">should point to win()!</span>'}`;
  }
}

function executeHeapStep(step) {
  const heap = state.heap;
  if (!heap) return;
  if (step.action === 'init') { /* nothing */ }
  else if (step.action === 'malloc') {
    const result = heap.malloc(step.size);
    if (result && step.name) {
      state.heapNames = state.heapNames || {};
      state.heapNames[step.name] = result.addr;
    }
  } else if (step.action === 'free') {
    const addr = state.heapNames[step.name];
    if (addr !== undefined) heap.free(addr);
  } else if (step.action === 'done') {
    state.completed.add(state.currentEx);
    saveProgress();
    renderNav();
  }
  if (step.log) step.log.forEach(([cls, msg]) => log(cls, msg));
  if (step.srcLine !== undefined) highlightExecLine(step.srcLine);
}

// UAF guided steps
const UAF_STEPS = [
  { srcLine: 9,  log: [['action', 'User *u = malloc(16) — allocated a 24-byte chunk for the User struct.']] },
  { srcLine: 10, log: [['action', 'u->action = greet — the function pointer is set to greet() (normal behavior).']] },
  { srcLine: 11, doFree: 'User', log: [['action', 'free(u) — the User chunk goes to the recycling list. But the program still has the pointer u!']] },
  { srcLine: 13, doMalloc: true, log: [['action', 'char *note = malloc(16) — same size as User! The allocator recycles the freed chunk. Note now occupies the SAME memory as the old User struct.']] },
  { done: true, log: [['info', 'Now enter the bytes to write into the note. The first 4 bytes will overwrite where the function pointer used to be. Write win()\'s address in little-endian!']] },
];

function doHeapStep() {
  const ex = EXERCISES[state.currentEx];
  if (!ex) return;

  if (ex.mode === 'heap-uaf') {
    if (state.heapStep >= UAF_STEPS.length) return;
    const step = UAF_STEPS[state.heapStep];

    if (step.doFree) {
      const addr = state.heapNames[step.doFree];
      if (addr !== undefined) state.heap.free(addr);
    }
    if (step.doMalloc) {
      const result = state.heap.malloc(16);
      if (result) {
        state.heapNames['Note'] = result.addr;
      }
    }
    if (step.log) step.log.forEach(([cls, msg]) => log(cls, msg));
    if (step.srcLine !== undefined) highlightExecLine(step.srcLine);

    state.heapStep++;

    if (step.done) {
      state.heapPhase = 'input';
      renderInput(ex);
    }

    renderViz();
    renderLog();
    return;
  }

  if (ex.mode === 'heap-double-free') {
    if (state.heapStep >= DF_STEPS.length) return;
    const step = DF_STEPS[state.heapStep];

    if (step.doFree) {
      const addr = state.heapNames[step.doFree];
      if (addr !== undefined) {
        // For double free, we need to allow freeing already-freed chunks
        if (step.doubleFree) {
          // Force free: re-mark as allocated so free() works
          const chunk = state.heap.chunks.get(addr);
          if (chunk) chunk.allocated = true;
          state.heap.free(addr);
        } else {
          state.heap.free(addr);
        }
      }
    }
    if (step.doMalloc) {
      const result = state.heap.malloc(16);
      if (result && step.name) {
        state.heapNames[step.name] = result.addr;
      }
    }
    if (step.log) step.log.forEach(([cls, msg]) => log(cls, msg));
    if (step.srcLine !== undefined) highlightExecLine(step.srcLine);

    state.heapStep++;

    if (step.done) {
      state.heapPhase = 'input';
      renderInput(ex);
    }

    renderViz();
    renderLog();
    return;
  }

  if (ex.mode === 'heap-tcache-poison') {
    if (state.heapStep >= TCP_STEPS.length) return;
    const step = TCP_STEPS[state.heapStep];

    if (step.doFree) {
      const addr = state.heapNames[step.doFree];
      if (addr !== undefined) state.heap.free(addr);
    }
    if (step.log) step.log.forEach(([cls, msg]) => log(cls, msg));
    if (step.srcLine !== undefined) highlightExecLine(step.srcLine);

    state.heapStep++;

    if (step.done) {
      state.heapPhase = 'input';
      renderInput(ex);
    }

    renderViz();
    renderLog();
    return;
  }

  if (ex.mode === 'heap-fastbin-dup') {
    if (state.heapStep >= FBD_STEPS.length) return;
    const step = FBD_STEPS[state.heapStep];

    if (step.doFree) {
      const addr = state.heapNames[step.doFree];
      if (addr !== undefined) {
        if (step.doubleFree) {
          const chunk = state.heap.chunks.get(addr);
          if (chunk) chunk.allocated = true;
          state.heap.free(addr);
        } else {
          state.heap.free(addr);
        }
      }
    }
    if (step.doDrainTcache) {
      // Drain tcache by doing 7 mallocs
      for (let i = 0; i < 7; i++) state.heap.malloc(16);
      log('action', 'Drained tcache with 7 mallocs. Next mallocs come from fastbin.');
    }
    if (step.log) step.log.forEach(([cls, msg]) => log(cls, msg));
    if (step.srcLine !== undefined) highlightExecLine(step.srcLine);

    state.heapStep++;

    if (step.done) {
      state.heapPhase = 'input';
      renderInput(ex);
    }

    renderViz();
    renderLog();
    return;
  }

  if (ex.mode === 'heap-unsorted-bin') {
    if (state.heapStep >= USB_STEPS.length) return;
    const step = USB_STEPS[state.heapStep];

    if (step.doFree) {
      const addr = state.heapNames[step.doFree];
      if (addr !== undefined) state.heap.free(addr);
    }
    if (step.log) step.log.forEach(([cls, msg]) => log(cls, msg));
    if (step.srcLine !== undefined) highlightExecLine(step.srcLine);

    state.heapStep++;

    if (step.done) {
      state.heapPhase = 'input';
      renderInput(ex);
    }

    renderViz();
    renderLog();
    return;
  }

  if (ex.mode === 'heap-house-force') {
    if (state.heapStep >= HOF_STEPS.length) return;
    const step = HOF_STEPS[state.heapStep];

    if (step.log) step.log.forEach(([cls, msg]) => log(cls, msg));
    if (step.srcLine !== undefined) highlightExecLine(step.srcLine);

    state.heapStep++;

    if (step.done) {
      state.heapPhase = 'overwrite-top';
      renderInput(ex);
    }

    renderViz();
    renderLog();
    return;
  }

  if (ex.mode === 'heap-house-spirit') {
    if (state.heapStep >= HOS_STEPS.length) return;
    const step = HOS_STEPS[state.heapStep];

    if (step.log) step.log.forEach(([cls, msg]) => log(cls, msg));
    if (step.srcLine !== undefined) highlightExecLine(step.srcLine);

    state.heapStep++;

    if (step.done) {
      state.heapPhase = 'fake-headers';
      renderInput(ex);
    }

    renderViz();
    renderLog();
    return;
  }

  if (ex.mode === 'heap-house-orange') {
    if (state.heapStep >= HOO_STEPS.length) return;
    const step = HOO_STEPS[state.heapStep];

    if (step.log) step.log.forEach(([cls, msg]) => log(cls, msg));
    if (step.srcLine !== undefined) highlightExecLine(step.srcLine);

    state.heapStep++;

    if (step.done) {
      state.heapPhase = 'corrupt-top';
      renderInput(ex);
    }

    renderViz();
    renderLog();
    return;
  }

  if (ex.mode === 'heap-house-einherjar') {
    if (state.heapStep >= HOE_STEPS.length) return;
    const step = HOE_STEPS[state.heapStep];

    if (step.log) step.log.forEach(([cls, msg]) => log(cls, msg));
    if (step.srcLine !== undefined) highlightExecLine(step.srcLine);

    state.heapStep++;

    if (step.done) {
      state.heapPhase = 'null-byte';
      renderInput(ex);
    }

    renderViz();
    renderLog();
    return;
  }

  if (ex.mode === 'heap-house-lore') {
    if (state.heapStep >= HOL_STEPS.length) return;
    const step = HOL_STEPS[state.heapStep];

    if (step.doFree) {
      const addr = state.heapNames[step.doFree];
      if (addr !== undefined) state.heap.free(addr);
    }
    if (step.doMallocSort) {
      // Simulate: request a different size, which triggers sorting of unsorted bin
      // A goes from unsorted to smallbin
      const sortAlloc = state.heap.malloc(120);
      // A should have been moved to smallbin conceptually
      // In our sim, the unsorted bin was checked; if A didn't fit, it gets sorted
      // We simulate by putting A into a "smallbin" structure
      const aAddr = state.heapNames['A'];
      if (aAddr !== undefined) {
        state.heap.smallbins = state.heap.smallbins || {};
        const chunk = state.heap.chunks.get(aAddr);
        if (chunk) {
          const sz = chunk.size;
          if (!state.heap.smallbins[sz]) state.heap.smallbins[sz] = [];
          state.heap.smallbins[sz].push(aAddr);
        }
      }
    }
    if (step.log) step.log.forEach(([cls, msg]) => log(cls, msg));
    if (step.srcLine !== undefined) highlightExecLine(step.srcLine);

    state.heapStep++;

    if (step.done) {
      state.heapPhase = 'corrupt-bk';
      renderInput(ex);
    }

    renderViz();
    renderLog();
    return;
  }

  if (ex.mode === 'final-blind') {
    blindDoStep();
    return;
  }
}

// Double-free guided steps
const DF_STEPS = [
  { srcLine: 3,  log: [['action', 'char *a = malloc(16) — chunk A is allocated.']] },
  { srcLine: 4,  doFree: 'A', log: [['action', 'free(a) — chunk A goes to the recycling list (tcache).']] },
  { srcLine: 5,  doFree: 'A', doubleFree: true, log: [['action', 'free(a) again — DOUBLE FREE! The chunk is added to the recycling list a second time. The list now has a cycle: A → A → ...']] },
  { srcLine: 6,  doMalloc: true, name: 'B', log: [['action', 'char *b = malloc(16) — returns chunk A from the list. But A is STILL on the list (because of the double free)!']] },
  { done: true, log: [['info', 'Now write the target address as b\'s data. This overwrites the recycling list\'s forward pointer (fd). The next-next malloc will return whatever address you write! Use the function pointer table address in little-endian.']] },
];

// Tcache poisoning guided steps
const TCP_STEPS = [
  { srcLine: 6,  log: [['action', 'char *a = malloc(16) — chunk A is allocated (24 bytes with header).']] },
  { srcLine: 7,  log: [['action', 'char *b = malloc(16) — chunk B is allocated right after A.']] },
  { srcLine: 8,  doFree: 'B', log: [['action', 'free(b) — chunk B goes to tcache. Look at B\'s data: the first 4 bytes are now the forward pointer (fd). Since B is the only entry, fd = 0x00000000 (end of list).']] },
  { srcLine: 9,  log: [['info', 'The program still has the pointer b (use-after-free). We can write to B\'s memory even though it\'s freed.']] },
  { done: true, log: [['info', 'Now overwrite B\'s fd pointer with the function pointer table address. When the allocator processes the tcache, it will follow fd and return YOUR address as a valid chunk! Enter the address in little-endian.']] },
];

// Fastbin dup guided steps
const FBD_STEPS = [
  { srcLine: 6,  log: [['info', 'Tcache is already full (7 entries for size 24). Chunks A and B are allocated.']] },
  { srcLine: 10, doFree: 'A', log: [['action', 'free(a) — tcache is full, so A goes to the fastbin instead. Fastbin[24]: A → nil']] },
  { srcLine: 11, doFree: 'B', log: [['action', 'free(b) — B also goes to fastbin. Fastbin[24]: B → A → nil']] },
  { srcLine: 12, doFree: 'A', doubleFree: true, log: [['action', 'free(a) AGAIN! Fastbin only checks if A == head. Head is B, so the check passes. Fastbin[24]: A → B → A → B → ... (cycle!)']] },
  { srcLine: 14, doDrainTcache: true, log: [['action', 'Drain tcache with 7 mallocs so next mallocs come from fastbin.']] },
  { done: true, log: [['info', 'The fastbin has a cycle: A → B → A → B → ... The next malloc(16) returns A from fastbin. Write the target address into A\'s data to poison the fd pointer. After two more mallocs (B, then A again), the fourth malloc follows the poisoned fd to YOUR address!']] },
];

// Unsorted bin attack guided steps
const USB_STEPS = [
  { srcLine: 5,  log: [['action', 'char *a = malloc(128) — chunk A is allocated (136 bytes with header). Large enough for unsorted bin.']] },
  { srcLine: 6,  log: [['action', 'char *guard = malloc(16) — guard chunk prevents A from merging with the top chunk when freed.']] },
  { srcLine: 8,  doFree: 'A', log: [['action', 'free(a) — chunk A is too big for tcache/fastbin, goes to the unsorted bin. A now has fd and bk pointers (at data+0 and data+4).']] },
  { srcLine: 10, log: [['info', 'The program still has pointer a (UAF). The unsorted bin is a doubly-linked list. When malloc removes a chunk from it, it does: chunk->bk->fd = bin_addr (writes main_arena address).']] },
  { done: true, log: [['info', 'Overwrite A\'s bk pointer so that bk->fd points to the function pointer table. Since fd is at offset 0 from the data start, and data starts 8 bytes into a chunk, set bk = funcPtrAddr - 8. The unlink will write main_arena there!']] },
];

// House of Force guided steps
const HOF_STEPS = [
  { srcLine: 5,  log: [['action', 'char *a = malloc(16) — chunk A is allocated. The top chunk (wilderness) sits right after A.']] },
  { srcLine: 6,  log: [['info', 'We have an overflow from chunk A. We can write past A\'s 16 bytes of data and into the top chunk\'s header (prev_size + size fields).']] },
  { done: true, log: [['info', 'Overflow into the top chunk header. Write 16 bytes of padding (for A\'s data), then 4 bytes of 00 (prev_size), then 4 bytes of FF (size = 0xFFFFFFFF). This makes the allocator think the top chunk is enormous.']] },
];

// House of Spirit guided steps
const HOS_STEPS = [
  { srcLine: 5,  log: [['action', 'char stack_buf[64] — a 64-byte buffer on the stack. We will build a fake chunk here.']] },
  { srcLine: 6,  log: [['info', 'A real chunk has an 8-byte header: 4 bytes prev_size + 4 bytes size. The size field has PREV_INUSE in bit 0.']] },
  { srcLine: 7,  log: [['info', 'For a 16-byte data chunk, the total size is 24 (0x18). With PREV_INUSE set: 0x18 | 1 = 0x19.']] },
  { srcLine: 10, log: [['info', 'glibc checks the NEXT chunk\'s header too (to verify size). So we need a valid header at offset +24 (right after our fake chunk\'s data).']] },
  { done: true, log: [['info', 'Now write the fake headers! You need 32 bytes total: [prev_size: 00 00 00 00] [size: 19 00 00 00] [16 bytes data: anything] [next prev_size: 00 00 00 00] [next size: 19 00 00 00]']] },
];

// House of Orange guided steps
const HOO_STEPS = [

function heapEinherjarNullByteSubmit() {
  const ta = document.getElementById('payload-input');
  if (!ta || !ta.value.trim()) { log('info', 'Type "yes" to execute the off-by-one.'); renderLog(); return; }

  const input = ta.value.trim().toLowerCase();
  if (input !== 'yes') {
    log('info', 'Type "yes" to confirm the off-by-one null byte overflow.');
    renderLog();
    return;
  }

  const heap = state.heap;
  const ex = EXERCISES[state.currentEx];
  const aAddr = state.heapNames['A'];
  const bAddr = state.heapNames['B'];
  const cAddr = state.heapNames['C'];

  if (aAddr === undefined || bAddr === undefined || cAddr === undefined) {
    log('error', 'Chunks not set up.'); renderLog(); return;
  }

  // Off-by-one: write null byte into B's size field low byte
  // A's data ends at aAddr + HEADER_SIZE + 16 = bAddr
  // B's header is at bAddr: prev_size(4) + size(4)
  // The size field is at bAddr + 4. Its low byte is at bAddr + 4.
  // Originally B's size = 0x19. Null byte in the size field's low byte → 0x18
  const bSizeOffset = bAddr + 4;
  const origSize = heap._readLE(bSizeOffset, 4);
  // Clear the low byte (set to 0x00): clears PREV_INUSE
  const newSize = origSize & 0xFFFFFF00;
  heap._writeLE(bSizeOffset, newSize, 4);
  heap.written[bSizeOffset] = 1;

  log('action', 'Off-by-one! Wrote 0x00 past A\'s data into B\'s size field.');
  log('action', 'B\'s size changed from <span class="log-addr">' + hex8(origSize) + '</span> to <span class="log-addr">' + hex8(newSize) + '</span> — PREV_INUSE is now CLEAR!');
  highlightExecLine(10);

  // Set B's prev_size to the distance from A's start to B
  const prevSizeVal = bAddr - aAddr; // = 0x18 (24 bytes)
  heap._writeLE(bAddr, prevSizeVal, 4);
  heap.written[bAddr] = 1; heap.written[bAddr+1] = 1; heap.written[bAddr+2] = 1; heap.written[bAddr+3] = 1;

  log('action', 'Set B\'s prev_size to <span class="log-addr">' + hex8(prevSizeVal) + '</span> (distance from A\'s start to B).');
  highlightExecLine(13);

  // Free C — this triggers backward consolidation
  // The allocator sees C's prev_in_use is... actually we need to clear C's prev_in_use too
  // In our simplified model: free(C) looks at C's prev chunk (B).
  // B's PREV_INUSE is clear → the allocator reads B's prev_size and consolidates backward.
  // Actually, let's simplify: when C is freed, it checks the NEXT chunk after C for prev_in_use.
  // For backward consolidation: it checks if B (the chunk before C) is free by looking at C's PREV_INUSE flag.
  // Let's clear C's PREV_INUSE flag too to trigger backward consolidation through B.
  const cSizeOffset = cAddr + 4;
  const origCSize = heap._readLE(cSizeOffset, 4);
  heap._writeLE(cSizeOffset, origCSize & ~1, 4);

  // Set C's prev_size to span back through B to A
  const cPrevSize = cAddr - aAddr; // distance from A to C
  heap._writeLE(cAddr, cPrevSize, 4);
  heap.written[cAddr] = 1; heap.written[cAddr+1] = 1; heap.written[cAddr+2] = 1; heap.written[cAddr+3] = 1;

  log('action', 'free(c) — the allocator checks C\'s PREV_INUSE flag... it\'s CLEAR!');
  log('action', 'Backward consolidation: reads C\'s prev_size (<span class="log-addr">' + hex8(cPrevSize) + '</span>) and merges back to offset ' + aAddr + '.');
  highlightExecLine(14);

  // Create a large merged chunk starting at A's address
  const mergedSize = cAddr + 24 - aAddr; // from A's start to end of C
  heap.chunks.set(aAddr, { size: mergedSize, allocated: false, dataStart: aAddr + heap.HEADER_SIZE });
  // Remove B and C from chunks map
  heap.chunks.delete(bAddr);
  heap.chunks.delete(cAddr);
  // Put the merged chunk in unsorted bin
  heap.unsorted.push(aAddr);
  heap._writeChunkHeader(aAddr, mergedSize, false);

  log('success', 'Backward consolidation created a merged chunk of ' + mergedSize + ' bytes starting at offset ' + aAddr + '!');
  log('info', 'This merged chunk overlaps where A, B, and C used to be.');

  // malloc(64) from this merged chunk gives overlapping allocation
  // Simulate: the allocator carves from the merged chunk
  const overlapAlloc = heap.malloc(64);
  if (overlapAlloc) {
    state.heapNames['D'] = overlapAlloc.addr;
    log('action', 'malloc(64) returned a chunk at offset ' + overlapAlloc.addr + ' — this overlaps the original chunks!');
    highlightExecLine(16);
  }

  // Set up function pointer in the overlap zone
  heap.funcPtrs.handler = { original: state.symbols.normal, current: state.symbols.normal };

  log('info', 'Write win()\'s address to overwrite the function pointer.');
  state.heapPhase = 'final-write';
  renderInput(ex);
  renderViz();
  renderLog();
}

  if (!input || !input.value.trim()) { log('info', 'Enter a count value.'); renderLog(); return; }
  const val = parseInt(input.value);
  if (isNaN(val) || val < 0) { log('error', 'Invalid number.'); renderLog(); return; }
  const count16 = val & 0xFFFF;
  const product = (count16 * 4) & 0xFFFF;

  log('action', 'scanf reads count = ' + count16 + ' (unsigned short)');
  highlightExecLine(11);

  if (product >= 16) {
    log('error', 'malloc(' + product + ') \u2014 that\'s not small enough to be useful. You need count*4 to wrap to a tiny number (< 16). Try a value where count*4 overflows past 65536.');
    renderLog();
    return;
  }

  if (product === 0) {
    log('error', 'malloc(0) still returns a minimum-size chunk (16 bytes). That might work, but try getting an even smaller size like 4.');
    // Still allow it — malloc(0) in our sim allocates minimum chunk
  }

  const heap = state.heap;
  const ex = EXERCISES[state.currentEx];

  // Allocate buf with the wrapped size
  state.chainBufSize = product;
  const bufAlloc = heap.malloc(product || 1); // malloc(0) -> minimum chunk
  if (bufAlloc) {
    state.chainBufAddr = bufAlloc.addr;
    state.heapNames['buf'] = bufAlloc.addr;
    log('action', 'char *buf = malloc(' + product + ') \u2192 buf at offset ' + bufAlloc.addr + ' (heap addr <span class="log-addr">' + hex8(heap.baseAddr + bufAlloc.addr) + '</span>)');
  }
  highlightExecLine(13);

  // Allocate cfg (16 bytes: 4 for handler + 12 for name)
  const cfgAlloc = heap.malloc(16);
  if (cfgAlloc) {
    state.chainCfgAddr = cfgAlloc.addr;
    state.heapNames['cfg'] = cfgAlloc.addr;
    // Write normal() as the handler
    heap._writeLE(cfgAlloc.dataAddr, state.symbols.normal, 4);
    for (let i = 0; i < 4; i++) heap.written[cfgAlloc.dataAddr + i] = 1;
    log('action', 'Config *cfg = malloc(16) \u2192 cfg at offset ' + cfgAlloc.addr + ' (heap addr <span class="log-addr">' + hex8(heap.baseAddr + cfgAlloc.addr) + '</span>)');
    log('action', 'cfg->handler = normal (<span class="log-addr">' + hex8(state.symbols.normal) + '</span>)');
  }
  highlightExecLine(14);

  // Move to Phase 2: info leak
  state.heapPhase = 'leak';
  log('success', 'Integer overflow! malloc got only ' + product + ' bytes instead of ' + (count16 * 4) + '.');

  // The info leak
  if (cfgAlloc) {
    log('warn', 'DEBUG: cfg at <span class="log-addr">' + hex8(heap.baseAddr + cfgAlloc.addr) + '</span> <span class="log-label">\u2190 this is the info leak!</span>');
  }
  highlightExecLine(18);

  renderInput(ex);
  renderViz();
  renderLog();
}

function chainLeakContinue() {
  const ex = EXERCISES[state.currentEx];
  const heap = state.heap;

  if (state.chainBufAddr === null || state.chainCfgAddr === null) {
    log('error', 'Something went wrong. Reset and try again.');
    renderLog();
    return;
  }

  const bufDataAddr = state.chainBufAddr + heap.HEADER_SIZE;
  const cfgDataAddr = state.chainCfgAddr + heap.HEADER_SIZE;
  const distance = cfgDataAddr - bufDataAddr;

  log('info', '<strong>Phase 3:</strong> buf\'s data is at heap offset ' + bufDataAddr + ', cfg\'s handler is at offset ' + cfgDataAddr + '. Distance = ' + distance + ' bytes.');
  log('info', 'Your payload needs ' + distance + ' bytes of padding, then win()\'s address (<span class="log-addr">' + hex8(state.symbols.win) + '</span>) in little-endian.');

  state.heapPhase = 'overflow';
  renderInput(ex);

  // Set the overflow hint
  const hintEl = document.getElementById('chain-overflow-hint');
  if (hintEl) {
    hintEl.innerHTML = 'buf data starts at offset ' + bufDataAddr + '. cfg->handler is at offset ' + cfgDataAddr + '. Padding needed: <strong>' + distance + ' bytes</strong>, then win() address in LE.';
  }

  renderViz();
  renderLog();
}

function chainOverflowSubmit() {
  const ta = document.getElementById('payload-input');
  if (!ta || !ta.value.trim()) { log('info', 'Enter a hex payload.'); renderLog(); return; }

  const bytes = hexStrToBytes(ta.value);
  if (bytes.length === 0) { log('error', 'Invalid hex input.'); renderLog(); return; }

  const heap = state.heap;
  const ex = EXERCISES[state.currentEx];

  const bufDataAddr = state.chainBufAddr + heap.HEADER_SIZE;
  const cfgDataAddr = state.chainCfgAddr + heap.HEADER_SIZE;

  // Write bytes starting at buf's data
  heap.write(bufDataAddr, bytes);
  highlightExecLine(21);

  log('action', 'read(0, buf, 256) \u2014 wrote ' + bytes.length + ' bytes starting at buf.');

  const distance = cfgDataAddr - bufDataAddr;
  if (bytes.length <= distance) {
    log('error', 'Only ' + bytes.length + ' bytes written. You need at least ' + (distance + 4) + ' bytes to reach and overwrite cfg->handler (' + distance + ' bytes padding + 4 bytes address).');
    renderViz();
    renderLog();
    return;
  }

  // Read what landed at cfg->handler
  const newPtr = heap._readLE(cfgDataAddr, 4);
  heap.funcPtrs.handler = { original: state.symbols.normal, current: newPtr };

  log('action', 'Overflow! Bytes reached cfg->handler. The function pointer is now <span class="log-addr">' + hex8(newPtr) + '</span>');

  state.heapPhase = 'exec';
  renderInput(ex);
  renderViz();
  renderLog();
}

function chainExecSubmit() {
  const heap = state.heap;
  const ex = EXERCISES[state.currentEx];

  const cfgDataAddr = state.chainCfgAddr + heap.HEADER_SIZE;
  const currentPtr = heap._readLE(cfgDataAddr, 4);

  log('action', 'cfg->handler() is called. handler = <span class="log-addr">' + hex8(currentPtr) + '</span>');
  highlightExecLine(23);

  if (currentPtr === state.symbols.win) {
    log('success', 'cfg->handler points to win()! Executing...');
    heap.funcPtrs.handler = { original: state.symbols.normal, current: state.symbols.win };
    state.completed.add(state.currentEx);
    saveProgress();
    renderNav();
    showSuccess(ex.winTitle, ex.winMsg);
  } else {
    const sym = Object.entries(state.symbols).find(([, a]) => a === currentPtr);
    if (sym) {
      log('error', 'Called ' + sym[0] + '() \u2014 not win(). Go back and fix your overflow payload.');
    } else {
      log('error', 'Jumped to <span class="log-addr">' + hex8(currentPtr) + '</span> \u2014 SEGFAULT! The function pointer must be win()\'s address. Reset and fix your payload.');
    }
  }

  renderViz();
  renderLog();
}

// ──────────────��─────────────────────��─────────
// Exercise 28: Blind Chain handlers
// ───���────────────────────────���─────────────────

const BLIND_STEPS = [
  {
    log: [['action', 'free(ptrs[1])']],
    doFree: 1,
    srcLine: 10,
  },
  {
    log: [['action', 'free(ptrs[2])']],
    doFree: 2,
    srcLine: 11,
    done: true,
  },
];

function blindDoStep() {
  const ex = EXERCISES[state.currentEx];
  if (!ex || ex.mode !== 'final-blind') return;
  if (state.heapStep >= BLIND_STEPS.length) return;

  const step = BLIND_STEPS[state.heapStep];
  const heap = state.heap;

  if (step.doFree !== undefined && state.blindPtrs && state.blindPtrs[step.doFree]) {
    heap.free(state.blindPtrs[step.doFree].addr);
  }

  if (step.log) step.log.forEach(([cls, msg]) => log(cls, msg));
  if (step.srcLine !== undefined) highlightExecLine(step.srcLine);

  state.heapStep++;

  if (step.done) {
    state.heapPhase = 'poison';
    renderInput(ex);
  }

  renderViz();
  renderLog();
}

function blindPoisonSubmit() {
  const ta = document.getElementById('payload-input');
  if (!ta || !ta.value.trim()) { log('info', 'Enter hex bytes.'); renderLog(); return; }

  const bytes = hexStrToBytes(ta.value);
  if (bytes.length < 4) { log('info', 'Need at least 4 bytes.'); renderLog(); return; }

  const heap = state.heap;
  const ex = EXERCISES[state.currentEx];

  // Write to freed chunk ptrs[2]'s data area (UAF write)
  const ptr2DataAddr = state.blindPtrs[2].dataAddr;
  heap.write(ptr2DataAddr, bytes);
  log('action', 'read(0, ptrs[2], 32) \u2014 wrote ' + bytes.length + ' bytes to freed chunk.');
  highlightExecLine(14);

  // Read the poisoned fd
  const poisonedFd = heap._readLE(ptr2DataAddr, 4);
  log('action', 'fd = <span class="log-addr">' + hex8(poisonedFd) + '</span>');

  // malloc(32) #1 -> returns ptrs[2] from tcache (the head)
  const x = heap.malloc(32);
  log('action', 'void *x = malloc(32)');
  highlightExecLine(15);

  // malloc(32) #2 -> follows poisoned fd to wherever user pointed it
  // Determine if the poisoned fd is a heap absolute addr or relative offset
  let targetOffset;
  if (poisonedFd >= heap.baseAddr && poisonedFd < heap.baseAddr + heap.memorySize) {
    // User gave an absolute heap address — convert to offset
    targetOffset = poisonedFd - heap.baseAddr;
  } else if (poisonedFd < heap.memorySize) {
    // User gave a raw offset
    targetOffset = poisonedFd;
  } else {
    // Some other address — just store it, will likely fail
    targetOffset = poisonedFd;
  }

  // The second malloc conceptually follows the fd pointer
  // We don't use heap.malloc here because the sim doesn't actually follow fd
  state.blindYAddr = targetOffset;
  state.blindYAbsAddr = poisonedFd;

  log('action', 'void *y = malloc(32) \u2014 follows fd to <span class="log-addr">' + hex8(poisonedFd) + '</span>.');
  highlightExecLine(16);

  state.heapPhase = 'write';
  renderInput(ex);
  renderViz();
  renderLog();
}

function blindWriteSubmit() {
  const ta = document.getElementById('payload-input');
  if (!ta || !ta.value.trim()) { log('info', 'Enter 4 hex bytes.'); renderLog(); return; }

  const bytes = hexStrToBytes(ta.value);
  if (bytes.length < 4) { log('info', 'Need 4 bytes.'); renderLog(); return; }

  const heap = state.heap;
  const ex = EXERCISES[state.currentEx];

  // Write to wherever y points
  const targetOffset = state.blindYAddr;
  if (targetOffset >= 0 && targetOffset < heap.memorySize) {
    heap.write(targetOffset, bytes);
  }

  const writtenVal = bytes[0] | (bytes[1] << 8) | (bytes[2] << 16) | (bytes[3] << 24);
  const writtenValU = writtenVal >>> 0;

  log('action', 'read(0, y, 4) \u2014 wrote <span class="log-addr">' + hex8(writtenValU) + '</span> to <span class="log-addr">' + hex8(state.blindYAbsAddr) + '</span>.');
  highlightExecLine(17);

  // Check if this overwrote ptrs[0]->fn
  const ptr0DataAddr = state.blindPtrs[0].dataAddr;
  const currentFn = heap._readLE(ptr0DataAddr, 4);
  heap.funcPtrs.fn = { original: state.symbols.normal, current: currentFn };

  state.heapPhase = 'exec';
  renderInput(ex);
  renderViz();
  renderLog();
}

function blindExecSubmit() {
  const heap = state.heap;
  const ex = EXERCISES[state.currentEx];

  const ptr0DataAddr = state.blindPtrs[0].dataAddr;
  const currentFn = heap._readLE(ptr0DataAddr, 4);

  log('action', 'ptrs[0]->fn() \u2014 calling <span class="log-addr">' + hex8(currentFn) + '</span>');
  highlightExecLine(19);

  if (currentFn === state.symbols.win) {
    log('success', 'That\'s 0x08048150 \u2014 the hidden function. Executing...');
    heap.funcPtrs.fn = { original: state.symbols.normal, current: state.symbols.win };
    state.completed.add(state.currentEx);
    saveProgress();
    renderNav();
    showSuccess(ex.winTitle, ex.winMsg);
  } else {
    const sym = Object.entries(state.symbols).find(([, a]) => a === currentFn);
    if (sym) {
      log('error', 'Called ' + sym[0] + '(). That\'s not the target.');
    } else if (currentFn === state.symbols.normal) {
      log('error', 'Called normal(). The function pointer was not overwritten. Your tcache poison didn\'t land on ptrs[0]->fn.');
    } else {
      log('error', 'SEGFAULT at <span class="log-addr">' + hex8(currentFn) + '</span>. Wrong address.');
    }
  }

  renderViz();
  renderLog();
}

function doReset() {
  state.running = false;
  state.execSteps = null;
  state.execIndex = 0;
  highlightExecLine(-1);
  if (typeof state.currentEx === 'number') {
    loadExercise(state.currentEx);
  } else {
    loadSandbox();
  }
}

function setInputMode(mode) {
  state.inputMode = mode;
  const ex = typeof state.currentEx === 'number' ? EXERCISES[state.currentEx] : null;
  if (ex) {
    renderInput(ex);
  } else {
    // sandbox - re-render mode toggle
    document.querySelectorAll('.input-mode-toggle button').forEach(b => {
      b.classList.toggle('active', b.textContent.toLowerCase().includes(mode === 'hex' ? 'hex' : 'ascii'));
    });
    const ta = document.getElementById('payload-input');
    if (ta) ta.placeholder = mode === 'hex' ? 'Enter hex bytes: 41 41 41 41 ...' : 'Type your input...';
  }
}

function calcHex() {
  const aEl = document.getElementById('calc-a');
  const bEl = document.getElementById('calc-b');
  const resEl = document.getElementById('calc-result');
  const opEl = document.getElementById('calc-op-btn');
  if (!aEl || !bEl || !resEl) return;

  const a = parseInt(aEl.value.replace(/^0x/i, ''), 16);
  const b = parseInt(bEl.value.replace(/^0x/i, ''), 16);
  if (isNaN(a) || isNaN(b)) { resEl.textContent = '—'; return; }

  const op = opEl.textContent.trim();
  const result = op === '+' ? (a + b) >>> 0 : (a - b) >>> 0;
  resEl.textContent = hex8(result);
}

function toggleCalcOp() {
  const opEl = document.getElementById('calc-op-btn');
  if (!opEl) return;
  opEl.textContent = opEl.textContent.trim() === '+' ? '−' : '+';
  calcHex();
}

function buildPayload() {
  const padEl = document.getElementById('b-pad');
  const ebpEl = document.getElementById('b-ebp');
  const addrEl = document.getElementById('b-addr');
  const canaryEl = document.getElementById('b-canary');
  const outEl = document.getElementById('built-payload');
  if (!padEl || !outEl) return;

  const padBytes = strToBytes(padEl.value);
  const ebpBytes = strToBytes(ebpEl.value);

  let canaryBytes = [];
  if (state.sim.useCanary) {
    const canaryHex = canaryEl ? canaryEl.value.replace(/^0x/i, '') : '';
    if (!canaryHex) {
      outEl.textContent = '(enter the canary value from the execution log)';
      return;
    }
    canaryBytes = addrToLE(canaryHex);
    if (!canaryBytes) {
      outEl.textContent = '(invalid canary hex)';
      return;
    }
  }

  const addrHex = addrEl.value.replace(/^0x/i, '');
  if (!addrHex) {
    outEl.textContent = '(enter a target address from the symbol table)';
    return;
  }
  const addrBytes = addrToLE(addrHex);
  if (!addrBytes) {
    outEl.textContent = '(invalid address)';
    return;
  }

  const all = [...padBytes.slice(0, state.sim.bufSize), ...canaryBytes, ...ebpBytes.slice(0, 4), ...addrBytes];
  const hexStr = all.map(b => hex2(b)).join(' ');
  const canaryDesc = state.sim.useCanary ? ' + 4 canary' : '';
  outEl.innerHTML = hexStr + '<br><span style="color:var(--text-dim);font-size:10px">' + all.length + ' bytes — ' +
    state.sim.bufSize + ' padding' + canaryDesc + ' + 4 EBP + 4 addr (' + hex8(parseInt(addrHex, 16)) + ' → LE: ' +
    addrBytes.map(b => hex2(b)).join(' ') + ')</span>';
}

function useBuiltPayload() {
  const padEl = document.getElementById('b-pad');
  const ebpEl = document.getElementById('b-ebp');
  const addrEl = document.getElementById('b-addr');
  const canaryEl = document.getElementById('b-canary');
  if (!padEl) return;

  const padBytes = strToBytes(padEl.value);
  const ebpBytes = strToBytes(ebpEl.value);

  let canaryBytes = [];
  if (state.sim.useCanary) {
    const canaryHex = canaryEl ? canaryEl.value.replace(/^0x/i, '') : '';
    if (!canaryHex) return;
    canaryBytes = addrToLE(canaryHex);
    if (!canaryBytes) return;
  }

  const addrHex = addrEl.value.replace(/^0x/i, '');
  if (!addrHex) return;
  const addrBytes = addrToLE(addrHex);
  if (!addrBytes) return;

  const all = [...padBytes.slice(0, state.sim.bufSize), ...canaryBytes, ...ebpBytes.slice(0, 4), ...addrBytes];
  const hexStr = all.map(b => hex2(b)).join(' ');

  state.inputMode = 'hex';
  const ta = document.getElementById('payload-input');
  if (ta) {
    ta.value = hexStr;
    onPayloadInput();
  }
  document.querySelectorAll('.input-mode-toggle button').forEach(b => {
    b.classList.toggle('active', b.textContent === 'Hex');
  });
}

function showSuccess(title, msg) {
  const banner = document.getElementById('success-banner');
  document.getElementById('success-title').textContent = title;
  document.getElementById('success-msg').textContent = msg;
  banner.classList.add('show');
}

function dismissSuccess() {
  document.getElementById('success-banner').classList.remove('show');
}

// Keyboard shortcuts
// ──────────────────────────────────────────────
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
  if (e.key === 'r' || e.key === 'R') doReset();
});

// Init

loadProgress();
loadExercise(0);
